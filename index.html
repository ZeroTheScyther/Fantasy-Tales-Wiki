  // ─── STORY ───────────────────────────────────────────────────

  'runes-of-chimera': {
    id: 'runes-of-chimera',
    title: 'Runes of Chimera',
    subtitle: 'A small-scale story-driven RPG. A prototype for something much larger.',
    category: 'project',
    tags: ['project', 'hydaelyn', 'game'],
    stub: false,
    todos: [
      'Full Nimvaei lore specific to Runes of Chimera',
      'Lunar Rose Academy character roster',
    ],
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Runes of Chimera** is a small-scale story-driven RPG targeting the FFXIV roleplay community. It serves as a prototype for the much larger [[Lunar Rose Academy (Game)|Lunar Rose Academy game]], building the core framework — combat, dialogue integration, character mechanics — at manageable scope.' },
        { type: 'p', text: 'Timeline placement: **after [[Fury\'s Gaze|the Fury\'s Gaze arc]], before the Umbra arc.**' },
      ]},
      { id: 'story', heading: 'Story Summary', content: [
        { type: 'p', text: '[[Zekito Silverblood|Zekito]] and [[Nimvaei / Liraz Laskaris|Nimvaei]] recover ancient arcanima (runes) from Belah\'dian ruins. Unable to decipher them, they seek help from **Orraux Clauvier** — an arcanist-medic at Camp Dragonhead — who agrees to decipher the runes in exchange for a chimera\'s core, claiming it cures Blackram disease afflicting his daughter Edrette.' },
        { type: 'p', text: 'What follows is a quest across [[Hydaelyn|Eorzea]] to gather six specific ingredients, each tied to one of [[Nimvaei / Liraz Laskaris|Nimvaei\'s]] six elemental runes.' },
        { type: 'table', headers: ['Order', 'Rune', 'Location', 'Puzzle', 'Prerequisite'],
          rows: [
            ['1', 'Ice', "Fury's Gaze, Coerthas", 'Chimera boss fight (fire melts ice wall)', 'None'],
            ['2', 'Water', 'Camp Bronze Lake, Vylbrand', "Use Ice to shield from Oschon's gale", 'Ice'],
            ['3', 'Earth', 'The Shroud (20.3, 30.9)', 'Use Water to defeat corrupted earth elemental', 'Water'],
            ['4', 'Levin', 'Anyx Minor, Dravanian Forelands', 'Recover Mari mammet from lightning dragon', 'Earth'],
            ['5', 'Fire', "Amalj'aa camp, S. Thanalan (35.1, 19.9)", 'Rune-matching wire puzzle', 'Levin'],
            ['6', 'Wind', 'Red Rim, Coerthas Western Highlands', '[[Woeborn]] sword realm fight with [[Nimvaei / Liraz Laskaris|Liraz]]', 'Fire'],
          ]
        },
      ]},
      { id: 'twist', heading: 'The Twist', content: [
        { type: 'p', text: 'Orraux is not Orraux. He is [[Mores Gwydion]] — who wrote the book on the ruins himself and engineered the entire quest. [[Zekito Silverblood|Zekito]] caught the scent of his intent early and was immobilised to prevent interference. The reveal scene:' },
        { type: 'rp', lines: [
          { speaker: 'Mores (as Orraux)', text: '"Oh you poor, gullible fool... I wrote that book so that you would go around fetching the materials I needed to bring her back once they matured."' },
          { speaker: '', text: '[looks to Zekito]' },
          { speaker: 'Mores', text: '"At least that one was sharp enough to catch scent of my intent. As much as it pains me to hold him thus in his wounded state, I couldn\'t have him interfere."' },
          { empty: true },
          { speaker: 'Nimvaei', text: '"So then... enlighten this poor fool. Why do you need my blade? Why did you need us to gather all of those materials?"' },
          { empty: true },
          { speaker: 'Mores', text: '"Your blade?" [scoffs] "That blade is mine, girl. Forged for me — as in it, resides my daughter\'s soul. The bloody beasts attacked my home, took my daughter to use her in their unholy experiments. Her soul resides in that blade. It was the only way I could keep her safe."' },
          { empty: true },
          { speaker: 'Mores', text: '"I tried and tried to revive her but the soul is a stubborn thing. I realized I couldn\'t just stuff her soul into a new body — she needed a body to match, to accept her soul."' },
          { empty: true },
          { speaker: 'Mores', text: '"So I set out to infuse bits of her soul into the missing two elements, awaiting for the day all those elements would harmonize to the signature of her soul. After long years of waiting, it is finally ready. All that is left is to use the same cursed technique to merge them all into a vessel!"' },
          { speaker: '', text: '[points toward Mammet Mari]' },
          { speaker: 'Mores', text: '"Oversoul — her end... and her beginning."' },
        ]},
      ]},
      { id: 'ending', heading: 'Ending', content: [
        { type: 'p', text: 'With help from [[Luvsan]] (dormant in [[Woeborn]]) and the mammet [[Mari]], [[Nimvaei / Liraz Laskaris|Nimvaei]] pulls [[Mores Gwydion|Mores\']] soul from Orraux\'s body into [[Woeborn]], where Nidhogg\'s hunger confines him. Orraux is left comatose. [[Mores Gwydion|Mores]], dormant in the blade, eventually comes to peace — he is with [[Mari]] again, in a sense.' },
        { type: 'p', text: 'The journal [[Mores Gwydion|Mores]] wrote for [[Mari]] — explaining everything he did and why — remains at the Blackram clinic for Edrette and the other patients. It makes it to her, just not the way he planned.' },
      ]},
      { id: 'woeborn-fight-detail', heading: 'The Woeborn Fight — RP Log', content: [
        { type: 'p', text: 'Rune 6 (Wind), at Red Rim. [[Nimvaei / Liraz Laskaris|Liraz]] faces the shade of [[Luvsan]] inside the sword realm. This forces her to relive the memory of killing him — and finally understand what she had actually been seeing:' },
        { type: 'rp', lines: [
          { speaker: 'Nimvaei (1/7)', text: 'It was within those sparse few moments that the shade wrapped its arms around her that the world around her seemed to freeze... It was almost enlightening, emphasising that of which she had gradually allowed herself to believe. Despite his beastly actions, and how fearsome they are, he was in the end...' },
          { speaker: 'Nimvaei (2/7)', text: 'Still human, still wishing to protect those that he loved... Her arms dropped as Liraz found herself drawn into a memory of days long gone... Of the days where she found herself shoved into the cart with numerous other women, all awaiting their inevitable slavery at some brothel Auria owned. This Dark Knight...' },

// ─── UTILS ────────────────────────────────────────────────────

function parseText(text, navigate) {
  if (!text) return null;
  const parts = [];
  let remaining = text;
  // Handle [[target|display]] and [[target]]
  const linkRe = /\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g;
  let lastIdx = 0;
  let match;
  // Also handle **bold** and *italic*
  const fullRe = /(\[\[([^\]|]+)(?:\|([^\]]+))?\]\]|\*\*([^*]+)\*\*|_([^_]+)_)/g;
  const segments = [];
  let li = 0;
  while ((match = fullRe.exec(remaining)) !== null) {
    if (match.index > li) {
      segments.push({ type: 'text', text: remaining.slice(li, match.index) });
    }
    if (match[0].startsWith('[[')) {
      const target = match[2];
      const display = match[3] || target;
      const id = LINK_MAP[target] || LINK_MAP[target.replace(/#.*$/, '')];
      segments.push({ type: 'link', target, display, id });
    } else if (match[0].startsWith('**')) {
      segments.push({ type: 'bold', text: match[4] });
    } else if (match[0].startsWith('_') || match[0].startsWith('*_')) {
      segments.push({ type: 'italic', text: match[5] });
    }
    li = match.index + match[0].length;
  }
  if (li < remaining.length) {
    segments.push({ type: 'text', text: remaining.slice(li) });
  }
  return segments.map((s, i) => {
    if (s.type === 'text') return s.text;
    if (s.type === 'bold') return <strong key={i} style={{color: 'var(--silver-3)', fontWeight: 600}}>{s.text}</strong>;
    if (s.type === 'italic') return <em key={i}>{s.text}</em>;
    if (s.type === 'link') {
      const exists = s.id && ARTICLES[s.id];
      return (
        <span
          key={i}
          className={`wikilink ${!exists ? 'dead' : ''}`}
          onClick={() => exists && navigate(s.id)}
        >
          {s.display}
        </span>
      );
    }
    return null;
  });
}

function buildSearchIndex() {
  return Object.values(ARTICLES).filter(a => a.id !== 'home' && a.id !== 'timeline').map(a => {
    let text = [a.title, a.subtitle || ''];
    if (a.sections) {
      a.sections.forEach(s => {
        if (s.content) s.content.forEach(c => {
          if (c.type === 'p') text.push(c.text);
          if (c.type === 'ul') c.items?.forEach(i => text.push(i));
        });
      });
    }
    return {
      id: a.id,
      title: a.title,
      category: a.category,
      stub: a.stub,
      searchText: text.join(' '),
    };
  });
}

function RichText({ text, navigate }) {
  return <>{parseText(text, navigate)}</>;
}

function ContentBlock({ block, navigate }) {
  switch (block.type) {
    case 'p':
      return <p className="article-p"><RichText text={block.text} navigate={navigate} /></p>;
    case 'quote':
      return <blockquote className="wiki-quote"><RichText text={block.text} navigate={navigate} /></blockquote>;
    case 'subsection':
      return <h4 className="subsection-heading">{block.text}</h4>;
    case 'ul':
      return (
        <ul className="article-ul">
          {(block.items || []).map((item, i) => (
            <li key={i}><RichText text={item} navigate={navigate} /></li>
          ))}
        </ul>
      );
    case 'table':
      return (
        <div className="wiki-table-wrap">
          <table className="wiki-table">
            <thead>
              <tr>{(block.headers || []).map((h, i) => <th key={i}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {(block.rows || []).map((row, ri) => (
                <tr key={ri}>
                  {row.map((cell, ci) => (
                    <td key={ci}><RichText text={cell} navigate={navigate} /></td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    case 'rp':
      return (
        <div className="rp-log">
          {(block.lines || []).map((line, i) => {
            if (line.empty) return <div key={i} className="rp-line empty" />;
            if (line.ooc) return <div key={i} className="rp-line"><span className="rp-ooc">{line.ooc}</span></div>;
            return (
              <div key={i} className="rp-line">
                {line.speaker && <span className="rp-speaker">{line.speaker}: </span>}
                {line.text}
              </div>
            );
          })}
        </div>
      );
    default:
      return null;
  }
}

                  if (t === 'partial') return null;
                  return <span key={t} className={`timeline-tag ${t}`}>{t === 'xiv' ? 'XIV Lore' : t === 'blackram' ? 'Blackram' : t === 'story' ? 'Story' : t}</span>;
                })}
                {event.major && <span className="timeline-tag major">Major Event</span>}
              </div>
              <div className="timeline-card-text">
                {event.tags.includes('partial')
                  ? <span className="timeline-partial">{event.text}</span>
                  : event.text.split('\n').map((line, li) => <p key={li} style={{marginBottom: li < event.text.split('\n').length - 1 ? '6px' : 0}}>{line}</p>)
                }
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Sidebar({ page, navigate, open, setOpen }) {
  const [openSections, setOpenSections] = useState(() => {
    const init = {};
    NAV.forEach(s => { init[s.id] = s.open; });
    return init;
  });
  const [search, setSearch] = useState('');
  const [results, setResults] = useState([]);
  const fuseRef = useRef(null);

  useEffect(() => {
    const index = buildSearchIndex();
    fuseRef.current = new Fuse(index, {
      keys: ['title', 'searchText'],
      threshold: 0.35,
      minMatchCharLength: 2,
    });
  }, []);

  const handleSearch = (q) => {
    setSearch(q);
    if (!q.trim() || !fuseRef.current) { setResults([]); return; }
    const res = fuseRef.current.search(q).slice(0, 8);
    setResults(res.map(r => r.item));
  };

  const toggle = (id) => setOpenSections(prev => ({ ...prev, [id]: !prev[id] }));

  return (
    <nav className={`wiki-sidebar ${open ? 'open' : ''}`}>
      <div className="sidebar-logo">
        <h1>Fantasy Tales<span>The Wiki</span></h1>
      </div>
      <div className="sidebar-search">
        <span className="search-icon">🔍</span>
        <input
          type="text"
          placeholder="Search articles..."
          value={search}
          onChange={e => handleSearch(e.target.value)}
          onBlur={() => setTimeout(() => setResults([]), 200)}
        />
        {results.length > 0 && (
          <div className="search-results">
            {results.map(r => (
              <div key={r.id} className="search-result-item" onMouseDown={() => { navigate(r.id); setSearch(''); setResults([]); }}>
                <div className="search-result-title">{r.title}{r.stub ? ' ✏' : ''}</div>
                <div className="search-result-cat">{r.category}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div className="sidebar-nav">
        {NAV.map(section => (
          <div key={section.id} className="nav-section">
            <div
              className={`nav-section-header ${openSections[section.id] ? 'open' : ''}`}
              onClick={() => toggle(section.id)}
            >
              <span>{section.icon}</span>
              <span>{section.label}</span>
              <span className="chevron">▶</span>
            </div>
            {openSections[section.id] && (
              <div className="nav-items">
                {section.items.map(item => (
                  <div
                    key={item.id}
                    className={`nav-item ${page === item.id ? 'active' : ''}`}
                    onClick={() => navigate(item.id)}
                  >
                    {item.label}
                    {item.stub && <span className="stub-dot" title="Stub article" />}
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </nav>
  );
}

function App() {
  const [page, setPage] = useState('home');
  const [sidebarOpen, setSidebarOpen] = useState(false);

  useEffect(() => {
    const handle = () => {
      const hash = window.location.hash.slice(1);
      setPage(hash || 'home');
    };
    window.addEventListener('hashchange', handle);
    handle();
    return () => window.removeEventListener('hashchange', handle);
  }, []);

  const navigate = useCallback((id) => {
    window.location.hash = id;
    setSidebarOpen(false);
    window.scrollTo(0, 0);
  }, []);

  const article = ARTICLES[page];
  const breadcrumb = (() => {
    if (page === 'home') return null;
    if (page === 'timeline') return [{ label: 'Reference' }];
    if (!article) return null;
    const catLabel = {
      character: 'Characters', world: 'Worlds', lore: 'Lore & Systems',
      faction: 'Factions', location: 'Locations', artifact: 'Artifacts',
      project: 'Story & Projects',
    }[article.category] || article.category;
    return [{ label: catLabel }];
  })();

  return (
    <div className="wiki-shell">
      <Sidebar page={page} navigate={navigate} open={sidebarOpen} setOpen={setSidebarOpen} />
      <div className="wiki-main">
        <div className="wiki-topbar">
          <button className="mobile-toggle" onClick={() => setSidebarOpen(o => !o)}>☰</button>
          <div className="topbar-breadcrumb">
            <span style={{cursor:'pointer'}} onClick={() => navigate('home')}>Wiki</span>
            {breadcrumb && breadcrumb.map((b, i) => (
              <React.Fragment key={i}>
                <span className="sep">›</span>
                <span>{b.label}</span>
              </React.Fragment>
            ))}
            {page !== 'home' && page !== 'timeline' && article && (
              <>
                <span className="sep">›</span>
                <span style={{color:'var(--silver-2)'}}>{article.title}</span>
              </>
            )}
          </div>
        </div>
        <div className="wiki-content">
          {page === 'home' && <HomePage navigate={navigate} />}
          {page === 'timeline' && <TimelinePage navigate={navigate} />}
          {page !== 'home' && page !== 'timeline' && article && (
            <ArticlePage article={article} navigate={navigate} />
          )}
          {page !== 'home' && page !== 'timeline' && !article && (
            <div style={{textAlign:'center', padding:'60px 0', color:'var(--text-3)'}}>
              <div style={{fontSize:'48px', marginBottom:'16px'}}>◇</div>
              <h2 style={{fontFamily:'Cinzel,serif', color:'var(--silver)', marginBottom:'8px'}}>Article Not Found</h2>
              <p>This page doesn't exist yet. <span className="wikilink" onClick={() => navigate('home')}>Return home →</span></p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
