<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Tales Wiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.basic.min.js"></script>
<style>
:root {
  --bg:          #0b0b16;
  --bg-2:        #0e0e1c;
  --bg-3:        #131328;
  --bg-card:     #15152a;
  --bg-hover:    #1a1a32;
  --red:         #7a1010;
  --red-2:       #9b1515;
  --red-bright:  #c0392b;
  --red-muted:   #3a0a0a;
  --silver:      #9090b0;
  --silver-2:    #b0b0cc;
  --silver-3:    #d0d0e8;
  --text:        #cccce0;
  --text-2:      #8888a8;
  --text-3:      #505068;
  --border:      #1c1c30;
  --border-2:    #262640;
  --border-red:  #2e0e0e;
  --amber:       #c09010;
  --amber-bg:    #1a1400;
  --amber-border:#3a2800;
  --green:       #2a7a2a;
  --sidebar-w:   280px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 17px;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: var(--silver-2); text-decoration: none; cursor: pointer; }
a:hover { color: var(--silver-3); text-decoration: underline; }

/* ── LAYOUT ───────────────────────────────────────────── */

.wiki-shell {
  display: flex;
  min-height: 100vh;
}

.wiki-sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
}

.wiki-main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.wiki-topbar {
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.wiki-content {
  flex: 1;
  max-width: 900px;
  padding: 40px 48px 80px;
  margin: 0 auto;
  width: 100%;
}

/* ── SIDEBAR ──────────────────────────────────────────── */

.sidebar-logo {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--border-red);
}

.sidebar-logo h1 {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--silver-3);
  line-height: 1.3;
}

.sidebar-logo span {
  display: block;
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--red-2);
  margin-top: 2px;
}

.sidebar-search {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.sidebar-search input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border-2);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  padding: 7px 12px 7px 32px;
  outline: none;
  transition: border-color 0.2s;
}

.sidebar-search input::placeholder { color: var(--text-3); }
.sidebar-search input:focus { border-color: var(--red-2); }

.sidebar-search .search-icon {
  position: absolute;
  left: 24px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  font-size: 13px;
  pointer-events: none;
}

.search-results {
  position: absolute;
  top: calc(100% - 2px);
  left: 14px;
  right: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: 0 0 4px 4px;
  z-index: 200;
  max-height: 320px;
  overflow-y: auto;
}

.search-result-item {
  padding: 8px 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.search-result-item:hover { background: var(--bg-hover); }
.search-result-item:last-child { border-bottom: none; }

.search-result-title {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--silver-3);
}

.search-result-cat {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  color: var(--text-3);
  margin-top: 1px;
  text-transform: capitalize;
}

.sidebar-nav {
  padding: 8px 0 24px;
  flex: 1;
}

.nav-section {
  margin-bottom: 4px;
}

.nav-section-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 16px;
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
}

.nav-section-header:hover { color: var(--text-2); }

.nav-section-header .chevron {
  margin-left: auto;
  transition: transform 0.2s;
  font-size: 9px;
}

.nav-section-header.open .chevron { transform: rotate(90deg); }

.nav-items {
  overflow: hidden;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 16px 5px 26px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
}

.nav-item:hover {
  color: var(--silver-2);
  background: var(--bg-hover);
  border-left-color: var(--border-2);
}

.nav-item.active {
  color: var(--silver-3);
  background: var(--bg-3);
  border-left-color: var(--red-2);
}

.stub-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--amber);
  flex-shrink: 0;
  margin-left: auto;
}

/* ── TOPBAR ───────────────────────────────────────────── */

.topbar-breadcrumb {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}

.topbar-breadcrumb span { color: var(--text-2); }
.topbar-breadcrumb .sep { color: var(--text-3); }

/* ── ARTICLE ──────────────────────────────────────────── */

.article-header {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.article-categories {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.category-tag {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--red-2);
  background: var(--red-muted);
  border: 1px solid var(--border-red);
  border-radius: 3px;
  padding: 2px 7px;
}

.article-title {
  font-family: 'Cinzel', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--silver-3);
  line-height: 1.2;
  margin-bottom: 6px;
}

.article-subtitle {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--text-2);
}

/* ── STUB NOTICE ──────────────────────────────────────── */

.stub-notice {
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  border-left: 3px solid var(--amber);
  border-radius: 4px;
  padding: 12px 16px;
  margin-bottom: 24px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.stub-notice-icon {
  font-size: 18px;
  flex-shrink: 0;
  margin-top: 1px;
}

.stub-notice-body {
  flex: 1;
}

.stub-notice-title {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 4px;
}

.stub-notice-body p {
  font-size: 14px;
  color: var(--text-2);
  margin-bottom: 6px;
}

.stub-todo-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.stub-todo-list li {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  color: var(--text-2);
  display: flex;
  align-items: flex-start;
  gap: 6px;
}

.stub-todo-list li::before {
  content: '○';
  color: var(--amber);
  flex-shrink: 0;
  margin-top: 1px;
}

/* ── ARTICLE BODY ─────────────────────────────────────── */

.article-with-infobox {
  display: flex;
  gap: 28px;
  align-items: flex-start;
}

.article-body {
  flex: 1;
  min-width: 0;
}

.article-lead {
  font-size: 18px;
  line-height: 1.65;
  margin-bottom: 24px;
}

.article-section {
  margin-bottom: 28px;
}

.section-heading {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--silver-2);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-heading::after {
  content: '';
  display: block;
  width: 20px;
  height: 1px;
  background: var(--red-2);
  margin-left: 4px;
}

.subsection-heading {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--silver);
  margin-bottom: 10px;
  margin-top: 18px;
}

.article-p {
  margin-bottom: 12px;
  color: var(--text);
}

.article-ul {
  list-style: none;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.article-ul li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding-left: 4px;
}

.article-ul li::before {
  content: '◆';
  color: var(--red-2);
  font-size: 8px;
  flex-shrink: 0;
  margin-top: 7px;
}

/* ── INFOBOX ──────────────────────────────────────────── */

.infobox {
  width: 240px;
  min-width: 240px;
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-top: 3px solid var(--red-2);
  border-radius: 0 0 4px 4px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  flex-shrink: 0;
}

.infobox-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  padding: 10px 12px 8px;
  color: var(--silver-3);
  border-bottom: 1px solid var(--border);
}

.infobox-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  border-bottom: 1px solid var(--border);
}

.infobox-row:last-child { border-bottom: none; }

.infobox-label {
  padding: 6px 8px;
  color: var(--text-3);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  background: var(--bg-3);
  display: flex;
  align-items: center;
}

.infobox-value {
  padding: 6px 8px;
  color: var(--text);
  font-size: 12px;
  line-height: 1.4;
}

/* ── TABLES ───────────────────────────────────────────── */

.wiki-table-wrap {
  overflow-x: auto;
  margin-bottom: 16px;
  border: 1px solid var(--border-2);
  border-radius: 4px;
}

.wiki-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}

.wiki-table th {
  background: var(--red-muted);
  color: var(--silver-2);
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 9px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border-red);
}

.wiki-table td {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.5;
}

.wiki-table tr:last-child td { border-bottom: none; }
.wiki-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

/* ── RP LOG ───────────────────────────────────────────── */

.rp-log {
  background: #0a0a14;
  border: 1px solid var(--border-2);
  border-left: 3px solid var(--red);
  border-radius: 0 4px 4px 0;
  padding: 16px 20px;
  margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
}

.rp-line {
  color: var(--text-2);
  margin-bottom: 4px;
}

.rp-line .rp-speaker {
  color: var(--red-bright);
  font-weight: 500;
}

.rp-line .rp-ooc {
  color: var(--text-3);
  font-style: italic;
}

.rp-line.empty {
  height: 10px;
}

/* ── QUOTE ────────────────────────────────────────────── */

.wiki-quote {
  border-left: 3px solid var(--red);
  padding: 10px 18px;
  margin: 16px 0;
  font-style: italic;
  color: var(--text-2);
  font-size: 18px;
  background: rgba(139,20,20,0.06);
}

/* ── WIKILINK ─────────────────────────────────────────── */

.wikilink {
  color: var(--silver-2);
  border-bottom: 1px dotted var(--silver);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.wikilink:hover {
  color: var(--silver-3);
  border-bottom-color: var(--silver-3);
  text-decoration: none;
}

.wikilink.dead {
  color: var(--red-bright);
  border-bottom-color: var(--red-bright);
}

/* ── HOME PAGE ────────────────────────────────────────── */

.home-hero {
  text-align: center;
  padding: 48px 0 40px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
}

.home-hero h1 {
  font-family: 'Cinzel', serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--silver-3);
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.home-hero .tagline {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 20px;
  color: var(--text-2);
  margin-bottom: 20px;
}

.home-hero .divider {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
  margin-bottom: 20px;
}

.home-hero .divider::before,
.home-hero .divider::after {
  content: '';
  width: 60px;
  height: 1px;
  background: var(--red-2);
}

.home-hero .divider-gem {
  color: var(--red-2);
  font-size: 10px;
}

.home-hero .overview {
  max-width: 620px;
  margin: 0 auto;
  color: var(--text-2);
  font-size: 17px;
  line-height: 1.7;
}

.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  margin-bottom: 40px;
}

.home-card {
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: 6px;
  padding: 16px 16px 14px;
  cursor: pointer;
  transition: all 0.2s;
  border-top: 2px solid var(--border-red);
}

.home-card:hover {
  border-top-color: var(--red-2);
  background: var(--bg-hover);
  transform: translateY(-1px);
}

.home-card-icon {
  font-size: 22px;
  margin-bottom: 8px;
}

.home-card-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--silver-2);
  margin-bottom: 4px;
}

.home-card-desc {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.4;
}

.home-section-title {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.home-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── TIMELINE ─────────────────────────────────────────── */

.timeline-page {}

.timeline-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}

.timeline-filter {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 3px;
  border: 1px solid var(--border-2);
  background: var(--bg-card);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
}

.timeline-filter:hover { border-color: var(--silver); color: var(--silver-2); }
.timeline-filter.active { background: var(--red-muted); border-color: var(--red-2); color: var(--silver-2); }

.timeline-list {
  position: relative;
  padding-left: 60px;
}

.timeline-list::before {
  content: '';
  position: absolute;
  left: 30px;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, transparent, var(--red) 5%, var(--red) 95%, transparent);
}

.timeline-event {
  position: relative;
  margin-bottom: 24px;
}

.timeline-year {
  position: absolute;
  left: -60px;
  width: 48px;
  text-align: right;
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--red-2);
  top: 3px;
  line-height: 1.2;
}

.timeline-dot {
  position: absolute;
  left: -36px;
  top: 5px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--bg-2);
  border: 2px solid var(--red);
  transform: translateX(-50%);
}

.timeline-dot.major {
  border-color: var(--red-bright);
  background: var(--red);
  width: 16px;
  height: 16px;
}

.timeline-card {
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: 4px;
  padding: 12px 16px;
}

.timeline-card-tags {
  display: flex;
  gap: 5px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.timeline-tag {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 2px;
}

.timeline-tag.xiv { background: #0d1a2a; color: #4488cc; border: 1px solid #0d2a44; }
.timeline-tag.story { background: var(--red-muted); color: var(--red-bright); border: 1px solid var(--border-red); }
.timeline-tag.blackram { background: #1a1000; color: #aa7700; border: 1px solid #2a1a00; }
.timeline-tag.major { background: #001a00; color: #44aa44; border: 1px solid #002a00; }

.timeline-card-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.6;
}

.timeline-partial {
  font-style: italic;
  color: var(--text-3);
  font-size: 14px;
}

/* ── SCROLLBAR ────────────────────────────────────────── */

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-2); }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--red); }

/* ── RESPONSIVE ───────────────────────────────────────── */

@media (max-width: 900px) {
  .wiki-sidebar { transform: translateX(-100%); transition: transform 0.3s; }
  .wiki-sidebar.open { transform: translateX(0); }
  .wiki-main { margin-left: 0; }
  .wiki-content { padding: 24px 20px 60px; }
  .article-with-infobox { flex-direction: column; }
  .infobox { width: 100%; min-width: 0; }
  .mobile-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-2);
    flex-shrink: 0;
  }
}

@media (min-width: 901px) {
  .mobile-toggle { display: none; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ═══════════════════════════════════════════════════════════════

const ARTICLES = {

  // ─── HOME ────────────────────────────────────────────────────
  'home': {
    id: 'home', title: 'Home', category: 'meta', tags: [], stub: false, todos: [],
  },

  // ─── CHARACTERS ──────────────────────────────────────────────

  'zekito-silverblood': {
    id: 'zekito-silverblood',
    title: 'Zekito Silverblood',
    subtitle: '"The world doesn\'t owe you a second chance. Take it anyway."',
    category: 'character',
    tags: ['character', 'erinn', 'hydaelyn', 'protagonist'],
    stub: false,
    todos: [
      'Current status in the story (present timeline)',
      'Full aftermath of killing his mother — how it reshaped him',
      'How Zekito ended up in Hydaelyn — world transition cause',
      'Full Hydaelyn arc beyond academy enrolment',
    ],
    infobox: {
      title: 'Zekito Silverblood',
      fields: [
        ['Also Known As', 'Zero (childhood), Zek'],
        ['Race', "Miqo'te / Fomorian half-breed"],
        ['True Age', '~200 years (former demigod)'],
        ['Current Power', '~20% of original'],
        ['Origin', 'Erinn — Tir Chonaill, Uladh'],
        ['Location', 'Hydaelyn — Lunar Rose Academy'],
        ['Affiliations', 'Audacia, The Aces, Blood Knights (former)'],
        ['Created By', 'John (ZeroTheScyther)'],
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Zekito Silverblood** — also known as **Zero** and **Zek** — is the central protagonist of Fantasy Tales. Half-[[Fomorian Blood|Fomorian]], half-Miqo\'te, he is the son of [[Isanshiro]] (the Silver King) and twin brother of [[Mewecho]]. Born into a kingdom that burned before he could remember it, he has spent two centuries wandering [[Erinn]] and now [[Hydaelyn]], defying the nature of what he is.' },
        { type: 'p', text: 'He is tall, muscular, silver-haired, and red-eyed — an immediately striking presence with cat ears that catch far more than he admits to, and a tail he usually keeps wrapped under his shirt. Despite his appearance, he is outgoing, brash, and audacious. He is also quietly terrified of losing anyone he lets close, and has been running from something for two hundred years.' },
      ]},
      { id: 'appearance', heading: 'Appearance', content: [
        { type: 'table', headers: ['Attribute', 'Detail'],
          rows: [
            ['Hair', 'Long, messy, silver-gray (arrived dark in Eorzea; turned white within 3 years)'],
            ['Eyes', 'Red — burning and intense, the gaze of a predator watching prey'],
            ['Height / Weight', '186 cm (6\'1") / 75 kg (165 lbs)'],
            ['Build', 'Tall, muscular'],
            ['Ears / Tail', 'Cat ears (used to eavesdrop; he pretends not to notice). Tail usually hidden under shirt.'],
            ['Scars', 'Numerous — torso, arms, legs'],
            ['Style', 'Mix of classy and urban; signature piece is a coat. Black and red.'],
          ]
        },
        { type: 'p', text: 'His cat ears give him an edge he rarely acknowledges — he hears far more than he lets on. The tail stays wrapped in most company; one of the few concessions he makes to blending in.' },
      ]},
      { id: 'personality', heading: 'Personality', content: [
        { type: 'p', text: 'Despite his appearance, Zekito is outgoing. Outspoken, brash, and audacious, loyal to a fault. He leads with confidence and can read a room, hold a conversation, and project ease even in unfamiliar company. But the ease is a performance. Beneath it: quick anger held in check by a lifetime of practice; a terror of losing people that drives him to put everyone else before himself; and an old bone-deep loneliness that no amount of company has ever fully touched.' },
        { type: 'p', text: 'He deflects with humor, explains things in plain terms, and uses physical demonstrations over lectures. He switches registers cleanly — businesslike with clients, warm and teasing with [[Nimvaei / Liraz Laskaris|Nimvaei]]. When his walls come down — a rare event — he speaks differently. Longer sentences, almost poetic. He is not inarticulate. He is usually just choosing not to use that voice.' },
        { type: 'table', headers: ['Trait', 'Detail'],
          rows: [
            ['Positive', 'Kind, honest, loyal, perseverant, brave'],
            ['Negative', 'Impulsive, crude, violent, stubborn'],
            ['Core Flaw', 'Puts others before himself to a self-destructive extreme'],
            ['Fear', 'Losing those close to him'],
            ['Dream', 'Finding a way back home to Erinn'],
            ['Drive', 'His friends'],
            ['Tic', 'Sighing'],
            ['Cope', 'Getting dead drunk'],
            ['Rage Trigger', 'His sister being hurt'],
            ['Habit', 'Always carries a notebook; records research, investigation notes, and field observations'],
            ['Likes', 'Whiskey, electric guitars, cellos, sleeping under big trees, fishing'],
            ['Dislikes', 'Elitists, smartasses, spicy food, being ignored'],
          ]
        },
        { type: 'p', text: '**Fighting style note:** Zekito fights barehanded in 99% of situations and refuses to use a weapon. When asked why, he said simply: *"It\'s harder to take a life that way."* A weapon creates distance between intention and consequence. He doesn\'t want that distance.' },
      ]},
      { id: 'abilities', heading: 'Abilities & Power', content: [
        { type: 'subsection', text: 'Fomorian Blood (Erinn)' },
        { type: 'p', text: 'Zekito carries powerful [[Fomorian Blood]] from his mother. This grants immense physical capability and magic potential at the cost of control. When pushed to extremes, he enters a feral berserk state — losing all reason, attacking anyone nearby, friend or foe. His [[The Bracelet|bracelet]] (enhanced by [[Merlin]]) suppresses this. The blood is always there, always waiting.' },
        { type: 'p', text: 'Beyond the berserk state is something worse — a full surrender to his voidsent nature he has spent 200 years running from. He is aware of this possibility. It is why he has secretly been training [[Nimvaei / Liraz Laskaris|Nimvaei]] to kill him if he ever loses control.' },
        { type: 'subsection', text: 'Magic (Erinn)' },
        { type: 'p', text: 'Trained by [[Merlin]] of [[The Aces]] for four years. [[Merlin]] taught him **Snap Cast** (chargeable spells fire instantly without casting time — this is the mechanic behind his instant Lightning Rod; the finger snap is the trigger) and **Spellwalk** (spells can be cast while moving). Both are considered impossible by Eorzean mage standards. He arrived treating them as ordinary.' },
        { type: 'p', text: 'His custom knuckles — forged by [[Merlin]] — let him channel high-level magic without a focus. One of very few in [[Erinn]] capable of this.' },
        { type: 'subsection', text: 'Eorzea — Spell Sheet' },
        { type: 'table', headers: ['Spell / Ability', 'Description'],
          rows: [
            ['Fireball', 'Gathers fire aether, hurls at enemy. Up to five in quick succession.'],
            ['Flame Torrent', 'Stomps foot; torrent of fire surrounds briefly. Defense and concealment.'],
            ['Lightning Rod (Snap Cast)', 'Stores a charge, deploys on finger snap. Instant bolt to target.'],
            ['Lightning Rod (Full Cast)', 'Massive levin release. Cannot move while channeling.'],
            ['Ice Dagger / Shards', 'Throws an ice dagger; variant explodes into shrapnel.'],
            ['Ice Wall / Spikes', 'Raises a wall for cover, or freezes ground and springs ice spikes upward.'],
            ['Wind Blast', 'Deflects projectiles and people.'],
            ["Wind's Razor", 'Vibrating wind strip around hands — chainsaw-like effect.'],
            ["Titan's Fists", 'Rock-hard gauntlets increase punching power.'],
            ['Barrier', 'Flat aetherial barriers. Usable as platforms. Up to 5 at once.'],
            ['Mana Ward / Shield', 'Ward: absorbs impact and redirects to ground. Shield: sustained absorption.'],
            ['Tri-Bind', 'Aetherial chains from ground or self to bind enemies.'],
            ['Sense Dulling / Heightening', 'Via direct contact: suppresses or amplifies target\'s senses.'],
            ['Clach (Rock Armor)', 'Rips rock shards from ground, fashions into body armor.'],
            ['Voice Throw / Change', 'Projects voice to another location, or modulates voice to impersonate.'],
            ['Sidhe / Fairy Dash', 'Compressed wind blasts for near-teleportation speed. Max two uses. [Wind Attunement]'],
            ["Void's Hunger", 'Absorbs aether from any touched object or creature. Fuels spells, heals. Overly potent sources risk body overload. This is his Fomorian nature refined — not a learned technique.'],
            ['Thunder Serpent', 'Temporarily converts body into pure lightning. Instant only — longer risks dispersal.'],
            ['Xceed (LB2)', 'Channels levin through every nerve. 11 seconds of supersonic speed and destructive force. Body collapses when it ends.'],
            ['Meteor (LB3)', 'His third Limit Break. Invented by [[Merlin]]. Most destructive spell in his arsenal. [Full mechanics TBD]'],
          ]
        },
        { type: 'subsection', text: 'Aetherial Alignment (Eorzea)' },
        { type: 'table', headers: ['Element', 'Affinity', 'Notes'],
          rows: [
            ['Levin', '26%', 'Dominant — natural attunement. Lightning resistance.'],
            ['Fire / Earth / Ice / Wind', '16% each', ''],
            ['Water', '10%', 'Weakest — Lightning boils Water (diametric opposition).'],
          ]
        },
        { type: 'p', text: '**Passives:** Levin Attunement (natural lightning resistance, easier levin casting). Aethersense (perceives aether flow, detects spellcasting, identifies individuals by aetherial signature — in dense aether, causes nausea; Primal-level aether can be physically incapacitating). Snap Cast and Spellwalk as described above.' },
      ]},
      { id: 'bracelet', heading: 'The Bracelet', content: [
        { type: 'p', text: 'A mythril bracelet (Auracite in Eorzea terms). Crafted by [[Merlin]], later enhanced by him. Two functions: it suppresses [[Fomorian Blood|Fomorian hunger]] by passively amassing ambient aether; and it is attuned to [[Mewecho]]\'s twin bracelet, meaning the siblings can never truly lose each other.' },
        { type: 'p', text: 'His soul as a demigod was too large to fit a mortal body. Only 1/10 transferred into his Eorzean body. The remaining 9/10 is stored within the bracelet. After [[Lunair Blackwind]]\'s procedure, this became 2/10 in body, 8/10 in bracelet.' },
        { type: 'p', text: '**His plan to return to [[Erinn]]:** breach the Crystal Tower, use it as a massive aetherial battery, amplify the bracelet\'s attunement until it tears open a portal to [[Mewecho]]\'s bracelet — and through it, to Erinn.' },
      ]},
      { id: 'history', heading: 'History', content: [
        { type: 'subsection', text: 'Arc 0 — Before Memory' },
        { type: 'p', text: 'Born in [[Erinn]] to [[Isanshiro]] (the Silver King) and a Fomorian mother. Twin to [[Mewecho]]. At age 4, [[Isanshiro]]\'s castle was besieged by the [[Knights of Light|Knights of Light]] who opposed the union of man and Fomor. To protect the twins, Isanshiro placed memory seals on both children and had them escorted to different parts of Erinn. Zekito was sent to [[Tir Chonaill]] as a farm boy. Mewecho was sent to the cold northern [[Vales]] — alone.' },
        { type: 'subsection', text: 'Arc 1 — The Road and the Pit' },
        { type: 'p', text: 'At age 10, his Fomorian blood overpowered the seal. Months of hallucinations culminated in him attempting to gut his adoptive father — he was banished. A year as a street rat in [[Dunbarton]], then chased into [[Dugald Forest]] where a massive adventurer punched a bear flat and handed him bread and a pair of knuckles: *"If you want to thank me, grow strong. Survive and bring me back my knuckles."* He never found the man. He kept the knuckles.' },
        { type: 'p', text: 'Four years wandering Erinn, doing odd jobs. Three years in an arena — the youngest fighter ever, losing repeatedly before starting to win. He never took the Champion title. He earned something harder to quantify: a name.' },
        { type: 'subsection', text: 'Arc 2 — Found Family' },
        { type: 'p', text: 'Returning to [[Tir Chonaill]], he met [[Jeff]] — naive, endlessly optimistic, impossible to shake. Jeff introduced him to [[Odjin]], [[Yuias]], and [[Ajaraka]]. These five became family. Odjin taught him magic. Yuias taught him to read and write. Ajaraka nagged him about diet. The found family ended at the bottom of a crypt: a vampire count struck down the party, Zekito went feral and nearly killed the people he\'d fought to protect. The party dissolved. One by one they faded. Jeff was last — and eventually he too vanished.' },
        { type: 'subsection', text: 'Arc 3 — Audacia' },
        { type: 'p', text: 'Years later, he joined [[Audacia]] guild. His honest, confident nature earned unexpected respect. When members began leaving for rival guild [[Nixia]], he and officer [[Nina]] went to negotiate — and met the Nixia officer who would turn out to be his twin sister [[Mewecho]], though neither of them knew it yet. The truth came later: a joint mission through Iria, a dragon, [[Mewecho]]\'s berserk rage felling the beast — and Zekito recognizing her bracelet.' },
        { type: 'subsection', text: 'Arc 4 — The Aces & Merlin' },
        { type: 'p', text: 'The twins tracked down [[The Aces]] and [[Merlin]], who tested them and enhanced their bracelets. [[Mewecho]] returned to [[Audacia]]. Zekito spent four years travelling with the Aces under [[Merlin]]\'s mentorship — receiving Snap Cast, Spellwalk, and his custom knuckles.' },
        { type: 'subsection', text: 'Arc 5 — The Zealots' },
        { type: 'p', text: 'He followed a lead to religious zealots in [[Iria]], stopping at [[Belvast]] first — where he found [[Mewecho]] and their father [[Isanshiro]], unexpectedly. A day of questioning. No answers about his mother. He followed the trail to the zealot hideout and found his mother there: decades of suffering and forced aetherial extraction had turned her into something barely recognizable. A weapon. There was nothing left to reach. He made the only choice he could. **He killed his mother.**' },
        { type: 'subsection', text: 'Arc 6 — Lunar Rose (Hydaelyn)' },
        { type: 'p', text: 'How Zekito arrived in [[Hydaelyn]] is not yet documented. He arrived naked, stripped of [[Fomorian Blood|Fomorian power]], reduced to an ordinary sickly Miqo\'te body. Odd jobs in [[Ul\'dah]], training with the Pugilist Guild, the slow realization this body was failing. Mage [[Gerel Kha]] diagnosed his soul dissonance and directed him to [[Lunar Rose Academy]]. He enrolled there — posing as a student while searching for someone who could treat his condition — and met [[Nimvaei / Liraz Laskaris|Nimvaei and Liraz]].' },
        { type: 'subsection', text: 'Arc 7 — Fury\'s Gaze' },
        { type: 'p', text: 'Zekito was captured by [[Fury\'s Gaze|Auria\'s facility]]. His bracelet markings were removed; his condition deteriorated to psychosis, delirium, and animalistic behaviour. Compound Psi was administered on [[Auria Van Varus|Auria]]\'s orders. He escaped containment and slaughtered his way to the 1F elevator before being retrieved by [[Lorelai Lesrekta]]. No bond recorded. No rung. **No status recorded.** He escaped before they could finish determining what he was. [[Cailean Arda]] was watching throughout as [[Umbra]]\'s embedded observer.' },
      ]},
      { id: 'relationships', heading: 'Relationships', content: [
        { type: 'p', text: '**[[Nimvaei / Liraz Laskaris|Nimvaei / Liraz]]:** Partner, best friend, eventual wife. Teacher/student energy that doesn\'t feel unequal. Humor flows both ways. The relationship feels long-established — no performance for each other. He has been secretly training her to kill him if he loses control. He told her at the start of the [[The Umbra Arc|Umbra arc]], after teaching her Smash. The training he framed as being about her freedom was always also about this.' },
        { type: 'p', text: '**[[Mewecho]]:** Twin sister. They found each other without knowing it — he negotiated with her across a guild conflict for years before recognizing her bracelet. Once they know, they become inseparable. Her bracelet and his are attuned; he can always find her.' },
        { type: 'p', text: '**[[Merlin]]:** Mentor. Four years of genuine teaching. Merlin gifted him the knuckles and the techniques that made him uniquely capable in Eorzea. The nature of what Merlin actually is remains open.' },
      ]},
      { id: 'breaking-points', heading: 'Breaking Points', content: [
        { type: 'ul', items: [
          'Almost killing his friends during the vampire count encounter',
          'Killing his mother at the zealot hideout',
          'His time at [[Fury\'s Gaze]] — what [[Auria Van Varus|Auria\'s]] facility did to him',
        ]},
      ]},
    ],
  },

  'nimvaei-liraz': {
    id: 'nimvaei-liraz',
    title: 'Nimvaei / Liraz Laskaris',
    subtitle: 'One person. Two faces. One arc.',
    category: 'character',
    tags: ['character', 'hydaelyn', 'au ra', 'dark knight'],
    stub: false,
    todos: [
      "Nimvaei's tagline / quote",
      'Full confirmation of Nimvaei\'s arc in Runes of Chimera',
    ],
    infobox: {
      title: 'Liraz Laskaris',
      fields: [
        ['Full Name', 'Liraz Laskaris (formerly Nimvaei Tumet)'],
        ['Race', "Au Ra (Xaela) — Tumet Clan, Azim Steppe"],
        ['Origin', 'Hydaelyn — born in the Azim Steppe'],
        ['Age', '26'],
        ['Height', '174 cm (taller than typical Au Ra due to experimentation)'],
        ['Build', 'Slender but strong'],
        ['Scales', 'Black'],
        ['Eyes', 'Golden'],
        ['Hair', 'Dark, disheveled'],
        ['First Met Zekito', '[[Lunar Rose Academy]], Hydaelyn'],
        ['Relationship', 'Partner, best friend, eventual wife of [[Zekito Silverblood]]'],
        ['Created By', "John's girlfriend"],
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Nimvaei** and **Liraz** are not two separate people. They are two halves of one — split by trauma. **Liraz Laskaris** is the original self, a child of the [[Tumet Clan]] on [[Hydaelyn]]\'s Azim Steppe. **Nimvaei** is what Liraz became after years under [[Auria Van Varus]] broke her apart — the innocence that survived, filtered through a dissociative break, carrying partial amnesia of her past as Liraz.' },
        { type: 'p', text: 'Their full arc is reintegration. Nimvaei willingly sacrifices herself — not dying, but merging back into Liraz, becoming her living shadow. She becomes the part of Liraz that can still believe in people. Liraz can summon her shadow form.' },
      ]},
      { id: 'appearance', heading: 'Appearance', content: [
        { type: 'p', text: 'An Au Ra Xaela woman, slender but strong, with black scales and golden eyes. Dark, disheveled hair. At 174 cm she is noticeably taller than typical Au Ra — a consequence of [[Auria Van Varus|Auria\'s]] experimentation. She wears white and blue, a direct visual contrast to [[Zekito Silverblood|Zekito\'s]] black and red.' },
        { type: 'p', text: '**Trance Form:** Draconic transformation — partial conversion to [[Woeborn|Nidhogg-like]] scales, fire aether going primal, demonic horns, raw energy. See [[The Trance]].' },
      ]},
      { id: 'nimvaei-persona', heading: 'Nimvaei — The Surface Self', content: [
        { type: 'p', text: 'Curious and engaged, not passive — she synthesizes and reflects back rather than just absorbing. Analytical by instinct. Warm and affectionate without being saccharine; her comfort with [[Zekito Silverblood|Zekito]] is shown through easy banter, not declarations. More formally spoken than him, but not stiff.' },
        { type: 'p', text: 'Her natural aetherial alignment is Fire — mirrors her Dark Knight soul; both are about controlled destruction. Fire comes naturally but is dangerous without discipline.' },
        { type: 'table', headers: ['Detail', 'Notes'],
          rows: [
            ['Food', 'Eats out of necessity, not enjoyment — whatever is available, simple, sufficient. In quieter moments she might put care into it.'],
            ['Faith', 'None. Does not believe in gods.'],
            ['Always Carries', 'A weapon. Her soul crystal. A bracelet given to her by [[Zekito Silverblood|Zekito]].'],
            ['Gear', 'Maintains her own weapons and equipment — not expertly, but good enough.'],
          ]
        },
        { type: 'quote', text: '"If her fifteen-year-old self were told about the present Nimvaei — the freedom, the strength, the fact that someone would choose her without trying to own or hurt her — she wouldn\'t believe it. Not one word of it."' },
      ]},
      { id: 'liraz', heading: 'Liraz — The Hidden Self', content: [
        { type: 'p', text: 'Cold, jagged, capable. A trained assassin and Dark Knight, groomed from childhood by [[Auria Van Varus]]. She hides inside Nimvaei\'s mind for most of the story, surfacing in moments of crisis. She is afraid of her own Dark Knight abilities — not that they would consume her, but that she might actually want them to.' },
        { type: 'p', text: 'She did not choose the Dark Knight path. She picked up [[Luvsan]]\'s soul crystal from his body. What she did not know until the [[Woeborn]] fight: she had killed the man it belonged to. He had been there trying to free her. She put a knife in his neck because everything in her said threat. She didn\'t know. She didn\'t care. She was safe. That was enough, back then.' },
        { type: 'p', text: 'Liraz\'s breakthrough is mechanical as well as narrative: she can only defeat the shade of [[Luvsan]] inside [[Woeborn]] by letting it stab her — by stopping running from what she is. When she does, the shadow becomes her blade.' },
      ]},
      { id: 'backstory', heading: 'Backstory', content: [
        { type: 'subsection', text: 'Before Auria' },
        { type: 'p', text: 'Before everything, she was quiet, determined, and attentive — a Tumet child who wanted to prove herself to her tribe and earn the honour of a name. At age ten she failed her trial. That failure fractured her certainty. She stopped feeling driven. When hope dwindled, survival took its place.' },
        { type: 'p', text: 'It was out of that fractured survival state that [[Auria Van Varus]] found her. Subject 142Ω. Ten doses of Compound Omega. Age twelve.' },
        { type: 'subsection', text: 'Under Auria' },
        { type: 'p', text: 'Dragon blood experimentation. Training that was also systematic psychological dismantlement. Liraz was intended to be [[Auria Van Varus|Auria\'s]] prized creation and eventual successor. At some point she was in a group being transported to a brothel Auria owned when [[Luvsan]] attacked Auria\'s men trying to free them. She killed him, not knowing who he was. She picked up his crystal years later, not knowing she had killed the man it belonged to.' },
        { type: 'p', text: 'The hardest decision she ever made was choosing to break free from her chains — to stop enduring and start choosing. To pursue what she actually wanted, for the first time, on her own terms.' },
      ]},
      { id: 'trance', heading: 'The Trance', content: [
        { type: 'p', text: 'Nimvaei\'s most dangerous state. A fusion with [[Woeborn]] that partially transforms her body and overrides her aether with Nidhogg\'s draconic power. It is not a technique. It is a curse she has to win against every time she uses it.' },
        { type: 'subsection', text: 'Activation' },
        { type: 'p', text: 'The first activation was not her choice — someone stabbed her with [[Woeborn]], forcing the fusion involuntarily. Every subsequent use requires her to stab herself with Woeborn and win a battle of wills against Nidhogg\'s rage. If she wins, she controls the Trance. If she loses, her mind is trapped and Nidhogg\'s will takes over completely — making her an unstoppable force of destruction.' },
        { type: 'subsection', text: 'Effects' },
        { type: 'ul', items: [
          'Draconic transformation: skin partially converts to Nidhogg-like scales; near-indestructibility. Fire aether becomes unstable — no longer controlled destruction, but primal.',
          'Anti-aether nullification: all aetherial enhancements, spells, and defenses are cancelled on contact. Mages are effectively helpless against her in this state.',
          'Extreme physical boost: strength and endurance push far beyond normal limits — she must be careful not to overexert and break her own body.',
        ]},
        { type: 'subsection', text: 'Cost' },
        { type: 'ul', items: [
          'Every activation is a risk — losing the internal fight against Nidhogg means she is gone.',
          'Significant physical toll on recovery.',
          'Single use per engagement — like [[Zekito Silverblood|Zekito\'s]] Xceed, all-or-nothing.',
        ]},
      ]},
    ],
  },

  'auria-van-varus': {
    id: 'auria-van-varus',
    title: 'Auria Van Varus',
    subtitle: 'General. Scientist. The architect of suffering.',
    category: 'character',
    tags: ['character', 'hydaelyn', 'antagonist', 'garlean'],
    stub: false,
    todos: [],
    infobox: {
      title: 'Auria Van Varus',
      fields: [
        ['Title', 'General of the Garlean Empire'],
        ['Role', 'Leader of [[Fury\'s Gaze]]'],
        ['Station', '[[Fury\'s Gaze|Fury\'s Gaze facility]], Western Coerthas Highlands'],
        ['Height', '168 cm'],
        ['Eyes', 'Brown — sharp, calculating'],
        ['Hair', 'Straight, brown, practical military style'],
        ['Weapon', 'Gunblade'],
        ['Status', 'Killed in 1582'],
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Auria Van Varus** is the former General of the Garlean Empire and the founder/leader of [[Fury\'s Gaze]]. She retreated to the Western Coerthas Highlands after Garlemald\'s collapse and built a private research facility, pursuing her vision of creating "Neo-Garleans" — a race bioengineered for superiority. She is the origin of all of [[Nimvaei / Liraz Laskaris|Liraz\'s]] trauma.' },
        { type: 'p', text: 'She was killed in 1582, during the events of the [[Final Days]].' },
      ]},
      { id: 'personality', heading: 'Personality', content: [
        { type: 'p', text: 'Ruthless, ambitious, and cold. She moves with the composure of someone who has already calculated three steps ahead, and the cruelty of someone who finds the calculation enjoyable. Her scientific approach is dispassionate — she observes test subjects the way a researcher watches reactions in a dish. Beneath that detachment, she takes personal pleasure in suffering, particularly in women, because it confirms her power.' },
        { type: 'p', text: 'She values efficiency and precision above all. Every relationship is transactional. Every ally is someone to be used and discarded when necessary. She views compassion as a weapon to exploit, not an experience to have.' },
      ]},
      { id: 'backstory', heading: 'Backstory', content: [
        { type: 'p', text: 'Shaped by years of abuse under a sadistic captain who molded her into a ruthless soldier. In the end, she murdered him and took his place — her first significant act of domination, and the template for everything that followed. During Garlemald\'s collapse she retreated to Coerthas and began building [[Fury\'s Gaze]].' },
      ]},
      { id: 'operations', heading: 'Operations', content: [
        { type: 'p', text: 'Beyond the [[Compound Research|compound programs]], Auria ran parallel operations serving as income streams and subject supply chains. She owned at least one brothel used to traffic women — primarily young women of the same demographic targeted by the [[Lambs of Dalamud]]. This is how [[Nimvaei / Liraz Laskaris|Liraz]] encountered [[Luvsan]]: she was being transported to that brothel when Luvsan attacked Auria\'s men to free the captives. Auria had wanted Luvsan dead for years due to the disruption he caused.' },
      ]},
      { id: 'relationships', heading: 'Key Relationships', content: [
        { type: 'p', text: '**[[Nimvaei / Liraz Laskaris|Liraz]]:** Auria took Liraz as a child, subjected her to Compound Omega experimentation at age 12, and spent years dismantling and rebuilding her as a prized creation and intended successor. What Auria did not account for: the person she was breaking had a self that refused to fully disappear. Nimvaei is what survived.' },
        { type: 'p', text: '**[[Zekito Silverblood|Zekito]]:** Auria hates him with thoroughness that is almost ideological. He is the antithesis of everything she values — freedom where she is control, compassion where she is cruelty, loyalty freely given where she demands obedience through fear. More specifically: he is the one who took Liraz from her. She experiences that not as love but as theft.' },
        { type: 'p', text: '**[[Cailean Arda]]:** Her apparent second-in-command during her tenure — but actually [[Umbra]]\'s embedded observer inside [[Fury\'s Gaze]], placed there to monitor her progress and protect their investment. She never knew he was always watching.' },
        { type: 'p', text: '**[[Amelia Graves]]:** Amelia loves Auria — genuinely. Whether this is the product of years of psychological conditioning or something that survived it is an open question. With Auria gone, that love is unmoored with nowhere to go. [[Umbra]] considers it a serious volatility risk.' },
      ]},
    ],
  },

  'mores-gwydion': {
    id: 'mores-gwydion',
    title: 'Mores Gwydion',
    subtitle: 'A devastated father who refused to accept a deadline.',
    category: 'character',
    tags: ['character', 'hydaelyn', 'antagonist', 'werlyt'],
    stub: false,
    todos: [],
    infobox: {
      title: 'Mores Gwydion',
      fields: [
        ['Age (at story time)', '~120+'],
        ['Origin', 'Werlyt'],
        ['Current Vessel', 'Orraux Clauvier (body)'],
        ['Technique', '[[Oversoul]]'],
        ['Daughter', '[[Mari]]'],
        ['Sword', '[[Woeborn]]'],
        ['Fate', 'Dormant inside [[Woeborn]]; eventually at peace'],
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Mores Gwydion** is the hidden villain of [[Runes of Chimera]]. A mage from Werlyt who has body-hopped through history for over a century using a forbidden technique called [[Oversoul]], keeping himself alive long enough to resurrect his daughter [[Mari]]. He is not truly evil — he is a devastated father who refused to accept his daughter\'s death and let that refusal consume a century. His love without limits became something that hurt everyone it touched.' },
        { type: 'p', text: 'He presents himself to [[Zekito Silverblood|Zekito]] and [[Nimvaei / Liraz Laskaris|Nimvaei]] as **Orraux Clauvier**, an arcanist-medic at Camp Dragonhead. Orraux\'s body is merely his current vessel.' },
      ]},
      { id: 'history', heading: 'History', content: [
        { type: 'table', headers: ['Year', 'Event'],
          rows: [
            ['1520', 'Gravely wounded fighting Nidhogg\'s advance. Enters stasis for two years. Presumed dead — [[Woeborn]] is forged from a Nidhogg scale in his honour. He did not forge it himself.'],
            ['1521', 'His family is slaughtered by Garleans. His daughter [[Mari]] (age 19) is captured and used in early Oversoul experiments. He recovers from stasis to find everything gone.'],
            ['1528', 'Begins studying Oversoul — the forbidden technique of soul transference.'],
            ['1537', 'Age 75. Performs his first Oversoul transfer to avoid dying before his goal is achieved.'],
            ['1558', 'Encounters Geciro Teciro (Lociro\'s brother) in a new host body.'],
            ['1559', 'Meets Nunuwa Nuwa — Geciro\'s wife. Tells her the truth. She becomes an ally.'],
            ['1561', 'Creates the Mari mammet using her soul imprint. Calls it a success. It is not a true resurrection.'],
            ['1563', 'Chimera experiments to develop a soul-harmonizing core — early attempts crack and break.'],
            ['1576', 'Takes Galene Didanc\'s mother as next host body.'],
            ['1582', 'Oversouls into Orraux Clauvier — his body at the start of [[Runes of Chimera]].'],
          ]
        },
      ]},
      { id: 'roc-role', heading: 'Role in Runes of Chimera', content: [
        { type: 'p', text: 'As Orraux, he sends [[Zekito Silverblood|Zekito]] and [[Nimvaei / Liraz Laskaris|Nimvaei]] to collect six specific ingredients across Eorzea, claiming they are for a cure to Blackram disease afflicting his daughter Edrette. In truth, he wrote the book on the ruins himself, engineered the entire quest to harvest the materials he needed, and used Nim and Zek as unwitting lab assistants. [[Zekito Silverblood|Zekito]] caught the scent of his intent early and was immobilised to prevent interference.' },
        { type: 'p', text: 'His goal: a true full resurrection of [[Mari]], not merely the mammet approximation. The six ingredients map to the components of a soul harmonization process — with [[Woeborn]] (containing [[Mari]]\'s soul) as the final vessel.' },
        { type: 'p', text: '**Ending:** [[Nimvaei / Liraz Laskaris|Nimvaei]], with help from [[Luvsan]] (dormant in Woeborn) and the mammet [[Mari]], pulls Mores\' soul into [[Woeborn]], where Nidhogg\'s hunger confines him. Orraux is left comatose. Mores, dormant in the blade, eventually comes to a kind of peace — he is with [[Mari]] again, in a sense.' },
      ]},
    ],
  },

  'luvsan': {
    id: 'luvsan',
    title: 'Luvsan',
    subtitle: 'A guardian she never knew she had.',
    category: 'character',
    tags: ['character', 'hydaelyn', 'dark knight', 'coerthas'],
    stub: false,
    todos: [],
    infobox: {
      title: 'Luvsan',
      fields: [
        ['Class', 'Dark Knight'],
        ['Region', 'Western Coerthas Highlands'],
        ['Sister', 'Taken by [[Auria Van Varus|Auria]]\'s men'],
        ['Soul Crystal', 'Passed to [[Nimvaei / Liraz Laskaris|Liraz]] in 1578'],
        ['Status', 'Shade — dormant within [[Woeborn]] after Liraz\'s breakthrough'],
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Luvsan** was a mercenary and Dark Knight operating in Western [[Coerthas]]. He dedicated his life to protecting a small frozen settlement at the edge of the wastes — providing food, gil, and safety to the people who lived there. He had a sister.' },
        { type: 'p', text: 'He was eventually killed by [[Nimvaei / Liraz Laskaris|Liraz]], who had no idea who he was. He had been trying to free her. His soul crystal, recovered years later without that knowledge, became the connection through which his rage at what [[Auria Van Varus|Auria]] had done to her became her courage — the thing that gave her the strength to finally run.' },
      ]},
      { id: 'history', heading: 'History', content: [
        { type: 'p', text: '[[Auria Van Varus]] raided his settlement in one of her operations to collect trafficking victims. His sister was taken. Luvsan spent years hunting Auria\'s operations in retaliation — slaughtering her men, ruining her income, causing major losses. He was a thorn in her side for a long time.' },
        { type: 'p', text: 'At some point, [[Mores Gwydion]] — inhabiting a host body — lured him to [[Ishgard]] with a promise of information. The meeting was a trap: Mores attempted to [[Oversoul]] into him. Luvsan\'s instinct to love and protect was greater than Mores\' will. His soul rejected the takeover — but the cost was severe. He became a rage-filled shade, sustained by a single drive: justice.' },
        { type: 'p', text: 'Two villains destroyed him independently and without ever knowing the other was involved: [[Auria Van Varus|Auria]] took everyone he loved; [[Mores Gwydion|Mores]] tried to take his body.' },
        { type: 'p', text: 'He was killed during one of Auria\'s trafficking operations — [[Nimvaei / Liraz Laskaris|Liraz]] was one of the women in the cart being transported to a brothel Auria owned. He was there attacking Auria\'s men, doing what he always did. From her perspective: a fearsome Dark Knight in the middle of a slaughter. [[Auria Van Varus|Auria\'s]] look still fresh in her memory, everything in her screaming to run. She had a job to finish first. She put a knife in his exposed neck, pulled it out, and watched him collapse. She didn\'t know who he was. She didn\'t care. She was safe. Finally.' },
        { type: 'p', text: 'In 1578, [[Nimvaei / Liraz Laskaris|Liraz]] picked up his soul crystal — not knowing she had killed the man it belonged to. Through the crystal, he witnessed what [[Auria Van Varus|Auria]] had been doing to her. His rage at that injustice became her courage. He stirred her soul and gave her the strength to run.' },
      ]},
      { id: 'woeborn-fight', heading: 'The Woeborn Fight', content: [
        { type: 'p', text: 'Inside [[Woeborn]], Luvsan\'s shade manifests as [[Nimvaei / Liraz Laskaris|Liraz\'s]] fear of her own Dark Knight abilities. The [[Woeborn]] fight forces her to relive the full memory — the cart, the other women, him attacking Auria\'s men, the knife, his collapse — and understand, for the first time, what she had actually been seeing.' },
        { type: 'p', text: 'She can only defeat the shade by **letting it stab her** — by stopping running from what she is. When she does, the shadow becomes her blade. Luvsan goes dormant. He passed the torch. He was never an antagonist. He was the person who died trying to free her, whose death she caused without knowing it, whose anger at that injustice became the thing that saved her.' },
      ]},
    ],
  },

  'merlin': {
    id: 'merlin',
    title: 'Merlin',
    subtitle: '"They say a true genius is born only once in a hundred years."',
    category: 'character',
    tags: ['character', 'erinn', 'the aces', 'druid'],
    stub: false,
    todos: [
      'What is Merlin exactly — has he genuinely not aged, or is he something else?',
      'Full details of what he did during his century of disappearance',
    ],
    infobox: {
      title: 'Merlin',
      fields: [
        ['Class', 'Druid'],
        ['Affiliation', '[[The Aces]]'],
        ['Inventor Of', 'Snap Cast, Spellwalk, Meteor Strike'],
        ['Student', '[[Zekito Silverblood]]'],
        ['Status', 'Active — unaged; reports persist of sightings across Erinn'],
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Merlin** is one of the most powerful mages in [[Erinn]] — and one of the most mysterious. He cast his first Lightning Bolt at age three. Invented his first new spell at eleven. Mastered every known form of magic by twenty-three. The magic community expected much from him; he was made Royal Castle Druid and put to work on research and kingdom defence. The work lacked the challenge to hold his interest. He vanished in search of adventure. That was over a hundred years ago.' },
        { type: 'p', text: 'He hasn\'t aged a day. Reports persist: if you are ever in genuine need, a Druid fitting his description will appear. Ever the playful prankster.' },
      ]},
      { id: 'inventions', heading: 'Inventions', content: [
        { type: 'p', text: 'Merlin didn\'t just master magic — he expanded what magic could do. His contributions are foundational:' },
        { type: 'ul', items: [
          '**Snap Cast:** Chargeable magic skills fire instantly — no casting time, no charge-up. Activates once per skill duration. The mechanic behind [[Zekito Silverblood|Zekito\'s]] instant Lightning Rod; the finger snap is the trigger. Considered impossible by Eorzean standards.',
          '**Spellwalk:** Allows spells to be cast while moving. Eorzean mages must be stationary to cast. [[Zekito Silverblood|Zekito]] arrived in Eorzea treating both as completely ordinary — he didn\'t realize they were unusual until people started staring.',
          '**Meteor Strike:** [[Zekito Silverblood|Zekito\'s]] LB3. His most destructive invention.',
          '**The Aces\' Weapons:** Merlin crafted the tools used by [[The Aces]], including [[Zekito Silverblood|Zekito\'s]] custom knuckles — identical in shape to the ones he\'d carried since age eleven, but built to channel high magic without a focus.',
        ]},
      ]},
      { id: 'zekito', heading: 'Mentorship of Zekito', content: [
        { type: 'p', text: 'Merlin tested both [[Zekito Silverblood|Zekito]] and [[Mewecho]] before agreeing to enhance their bracelets. [[Mewecho]] returned to [[Audacia]]; [[Zekito Silverblood|Zekito]] spent four years travelling with [[The Aces]] under Merlin\'s mentorship. The training was rigorous and genuine — when Zekito left, Merlin gave him the custom knuckles as a farewell gift, without ceremony. The playful exterior and the real investment in other people\'s growth are both true.' },
      ]},
    ],
  },

      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Mewecho** is [[Zekito Silverblood|Zekito\'s]] twin sister and the other surviving child of [[Isanshiro]] and their Fomorian mother. Where Zekito was sent to [[Tir Chonaill]] as a farm boy, she was sent alone to the cold northern [[Vales]] — a far harsher fate. She carries the same [[Fomorian Blood|Fomorian blood]] as her brother. Her bracelet is the twin of his, the two attuned to each other so they can never truly lose one another.' },

        { type: 'p', text: '**Isanshiro**, known as the Silver King, is a Milletian — a being from another world — who traveled [[Erinn]], amassed a fortune, and used it to build [[The Silver Kingdom]] for the destitute. His relationship with a Fomorian woman was the forbidden union that caused the [[Knights of Light]] to destroy everything he built. To protect his twin children, he placed memory seals on them and had them escorted to different parts of Erinn before the castle fell.' },
        { type: 'p', text: 'He placed memory seals on the twins to protect them, then disappeared. He later resurfaced in contact with [[Mewecho]], who kept this secret from [[Zekito Silverblood|Zekito]] out of fear of his reaction. He is deeply guarded about what happened to the twins\' mother — the one subject he will not discuss.' },

        { type: 'p', text: 'Her goal is [[Nimvaei / Liraz Laskaris|Liraz]] — personally. Her vendetta is not ideological; it is specific. She was also the one who dragged [[Zekito Silverblood|Zekito]] back to his cell when he nearly escaped [[Fury\'s Gaze]].' },

        { type: 'p', text: 'Except, it seems, for [[Auria Van Varus|Auria]]. Amelia loves her — genuinely, in whatever broken way is left to someone who can no longer feel warmth, cold, pain, or touch. With [[Auria Van Varus|Auria]] gone, that love is unmoored with nowhere to go. [[Umbra]] considers this a serious volatility risk. She is a grenade with the pin already pulled.' },

  'erinn': {

    title: 'Erinn',
    subtitle: 'The source world. Where the story begins.',

    infobox: {

        ['Notable Features', 'Fomorians, Milletians, focus-based magic'],

    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Erinn** is the source world of Fantasy Tales — where [[Zekito Silverblood]] was born and spent the majority of his early life. A world of magic, myth, and ancient power. Milletians — beings from other worlds — exist in Erinn as a known phenomenon, treated with curiosity and wariness.' },
      ]},
      { id: 'regions', heading: 'Regions & Key Locations', content: [
        { type: 'table', headers: ['Location', 'Description'],
          rows: [
            ['Uladh', 'The western region — more civilized. Contains Tir Chonaill, Dunbarton, and Tara.'],
            ['[[Tir Chonaill]]', "A small farming village in Uladh. Zekito's adoptive home and the place that banished him."],
            ['[[Dunbarton]]', "A larger town in Uladh. Zekito spent a year here as a street rat after banishment."],
            ['[[Dugald Forest]]', 'Forest connecting Tir Chonaill and Dunbarton. Site of the encounter with the adventurer who gave Zekito his first knuckles.'],
            ['Tara', 'Capital city of Uladh. Hub of commerce and politics.'],
            ['Belvast', 'The only major market island in Erinn. A melting pot of merchants, adventurers, and mercenaries.'],
            ['Iria', 'The eastern continent. Vast deserts, elven villages, homeland of various tribes. Site of the zealot hideout.'],
            ['Vales', 'Northern cold lands. Where [[Mewecho]] was forced to grow up alone.'],
            ['The Silver Kingdom', "Isanshiro's kingdom, built for the destitute. Destroyed by the Knights of Light."],
          ]
        },
      ]},
      { id: 'nature', heading: 'Nature of Erinn', content: [
        { type: 'p', text: 'Erinn accommodates both humans and [[Fomorian Blood|Fomorians]] — ancient, powerful beings of primal magic. Half-breeds (those born of both) are rare and carry immense power, but that power is volatile. [[Fomorian Blood|Fomorian blood]] expresses as berserk states where the host loses all control. Bracelets enchanted by powerful mages can suppress this, but the blood is never truly gone.' },
      ]},
      { id: 'magic', heading: 'Magic System', content: [
        { type: 'p', text: 'Magic in Erinn typically requires a **focus** — a staff or wand — to channel. Higher-level magic without a focus is considered extremely difficult and rare. [[Zekito Silverblood|Zekito]] is one of the very few who can do this, thanks to his custom knuckles crafted by [[Merlin]] and the techniques Merlin taught him (Snap Cast, Spellwalk).' },
      ]},
    ],
  },

  // ─── LORE & SYSTEMS ──────────────────────────────────────────

  'aether': {
    id: 'aether',
    title: 'Aether',
    subtitle: 'The life energy that permeates Hydaelyn.',
    category: 'lore',
    tags: ['lore', 'hydaelyn', 'magic system'],
    stub: false,
    todos: [],
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Aether** is the energy of [[Hydaelyn]] — it is all around and within all living things. All magic on Hydaelyn is derived from aether. It exists in six aspects and two polarities.' },
      ]},
      { id: 'forms', heading: 'Forms of Aether', content: [
        { type: 'ul', items: [
          '**Corporeal** — the aetherpool within a living body, used for casting spells.',
          '**Spiritual** — tied to mind and soul; the aether of consciousness and identity.',
          '**Ambiental / Environmental** — unbound aether that exists throughout the world, ambient in air, stone, water, and living things.',
          '**Surface Aether** (subset) — the unbound leftover of spent aetherial bodies such as cast spells or the residue of people. Primarily used by Conjurers and Red Mages. Usually too thin to distinguish from ambiental aether.',
        ]},
        { type: 'p', text: '*Aether released upon death returns to the aetherial sea from which all life begins. Only so much can cross at a time — excess remains as glowing mist, crystals, or ghostly apparitions. More violent deaths yield more excess.*' },
      ]},
      { id: 'polarity', heading: 'Polarity — Umbral & Astral', content: [
        { type: 'p', text: 'Polarity describes aetherial **frequency**. Umbral (Stasis): frequency 1,000–9,800. Astral (Activity): frequency 10,200–20,000.' },
        { type: 'table', headers: ['Element', 'Umbral State', 'Astral State', 'Natural Tendency'],
          rows: [
            ['Ice', 'Frost / controlled ice', 'Explosive blizzard', 'Naturally Umbral — easiest to control'],
            ['Earth', 'Solid rock', 'Dust, quicksand', ''],
            ['Water', 'Stagnant lake', 'Jet that cuts through stone', ''],
            ['Wind', 'Still air', 'Cutting gale', ''],
            ['Fire', 'Dry haze', 'Consuming flame', ''],
            ['Levin', 'Electromagnetism / EMP', 'Lightning', 'Naturally Astral — hardest to tame'],
          ]
        },
        { type: 'p', text: 'Character **alignment** describes which element their aether naturally resonates with. Casting the same element repeatedly causes aspecting — your aetherpool drifts toward that element and becomes unstable. Counterbalancing with the opposite element stabilizes it (astral fire ↔ umbral ice).' },
      ]},
      { id: 'elements', heading: 'Elemental Interactions', content: [
        { type: 'p', text: '**Conquests (strong against):** Earth grounds Lightning. Water erodes Earth. Lightning boils Water.' },
        { type: 'p', text: '**Submissions (weak against):** Fire is extinguished by Wind. Ice is melted by Fire. Wind is obstructed by Ice.' },
        { type: 'p', text: '**Diametric oppositions:** Fire ↔ Water. Earth ↔ Wind. Ice ↔ Lightning.' },
      ]},
      { id: 'crystallization', heading: 'Crystallization', content: [
        { type: 'ul', items: [
          '**Astral crystallization:** Slowly increase frequency to ~1,800 then spike to ~3,600 in under 0.1 seconds. If the spike fails, aether destabilizes and causes an aetherial explosion.',
          '**Umbral crystallization:** Bring frequency to 0 — temporary; aether will naturally stir back toward the 1,000 minimal-stability mark.',
        ]},
      ]},
      { id: 'disturbance', heading: 'Aetherial Disturbance / Soul Dissonance', content: [
        { type: 'p', text: 'Caused by the body not recognizing its own aether as belonging to it — most commonly when a foreign soul inhabits a body not matched to its aetherial signature. Symptoms: excruciating pain, increased aether consumption, sporadic loss of bodily control, body functions beginning to fail.' },
        { type: 'p', text: '[[Zekito Silverblood|Zekito\'s]] version: his demigod soul is too large for the Miqo\'te body it was placed in. The body\'s aetherial signature rejects the foreign soul. Managed (not cured) by special magitek armour, and later partially resolved by [[Lunair Blackwind]]\'s procedure.' },
      ]},
    ],
  },

  'fomorian-blood': {
    id: 'fomorian-blood',
    title: 'Fomorian Blood',
    subtitle: 'Ancient, powerful, hungry.',
    category: 'lore',
    tags: ['lore', 'erinn', 'fomor'],
    stub: false,
    todos: [],
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Fomorians** are ancient beings of primal magic in [[Erinn]]. Their core nature: they are life-consumers. They feed on [[Aether|aether]], on life. Half-breeds — those born of Fomor and human — inherit this nature, often without the instinctive knowledge of how to manage it.' },
      ]},
      { id: 'expression', heading: 'Expression in Half-Breeds', content: [
        { type: 'ul', items: [
          '**Immense physical capability and magic potential**',
          "**Berserk states:** Primal rages triggered by extreme emotional or physical stress. The host loses all reason and attacks anyone nearby — friend or foe. [[Zekito Silverblood|Zekito]] entered this state at the vampire count encounter. [[Mewecho]] entered it during the Iria dragon battle.",
          "**Void's Hunger:** The ability to absorb aether from any touched object or creature. Not a learned technique — it is the Fomor nature itself, refined into something controlled.",
          '**Life-consumption:** The deeper nature. At full expression (full berserk with no bracelet suppression), the half-breed feeds on life itself.',
        ]},
      ]},
      { id: 'suppression', heading: 'Suppression', content: [
        { type: 'p', text: 'Bracelets enchanted by powerful mages passively amass ambient aether for the host to feed on — removing the need to prey on living beings. The bracelet does not eliminate the blood. It channels the hunger away from living targets. Remove the bracelet and the hunger breaks through.' },
        { type: 'p', text: '[[Zekito Silverblood|Zekito\'s]] [[The Bracelet|bracelet]] was crafted and enhanced by [[Merlin]]. It additionally serves as an aetherial storage vessel for his demigod soul (9/10 initially, 8/10 after [[Lunair Blackwind]]\'s procedure).' },
      ]},
    ],
  },

  'woeborn': {

    title: 'Woeborn',
    subtitle: 'A sword forged in honour. Filled with grief.',
    category: 'artifact',
    tags: ['artifact', 'hydaelyn', 'nidhogg', 'mores'],
    stub: false,
    todos: [],
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Woeborn** is a sword forged from one of Nidhogg\'s scales. It was made in [[Mores Gwydion|Mores Gwydion\'s]] honour while he was presumed dead following the battle with Nidhogg in 1520. He did not forge it himself — others made it for him. When he recovered from stasis to find his family slaughtered and his daughter [[Mari]] taken, Woeborn became the vessel he used to preserve what remained of her soul.' },
      ]},
      { id: 'contents', heading: 'Contents (End of Story)', content: [

          '**[[Luvsan]]** — dormant, after passing the torch to [[Nimvaei / Liraz Laskaris|Liraz]].',
          '**[[Mores Gwydion|Mores]]** — dormant, eventually at peace. He is with [[Mari]] again, in a sense.',
          '**Nimvaei** — [[Nimvaei / Liraz Laskaris|Liraz\'s]] living shadow. Summonable. The good, fully merged with the bad.',
        ]},
        { type: 'p', text: 'The sword is soul-bound to [[Nimvaei / Liraz Laskaris|Liraz]]. Half of her soul IS the sword. All inhabitants can communicate with her telepathically.' },

        { type: 'p', text: '[[Nimvaei / Liraz Laskaris|Nimvaei\'s]] first involuntary [[Nimvaei / Liraz Laskaris#trance|Trance]] was triggered when someone stabbed her with Woeborn, forcing the draconic fusion on her. Every subsequent activation requires self-stabbing and winning a battle of wills against Nidhogg\'s rage.' },
      ]},
    ],

      { id: 'overview', heading: null, content: [
        { type: 'p', text: 'The **Lambs of Dalamud** are a fractured religious cult operating across multiple regions of [[Hydaelyn]]. They summon voidsent by sacrificing captives or themselves. Multiple semi-independent sects with infrequent communication operate across Northern Thanalan, South Shroud (Amdapor Ruins), and North Shroud.' },
        { type: 'p', text: 'They fell on hard times after the Final Days when captives they held began transforming into monsters and turned on their own ranks. Their operations continued regardless — they are currently running **Operation Dalamud** in Western Coerthas, a revenge operation for the Ahriman incident [[Zekito Silverblood|Zekito]] had been tracking.' },

      { id: 'investigation', heading: "Zekito's Investigation", content: [
        { type: 'p', text: '[[Zekito Silverblood|Zekito]] has been tracking the Lambs as part of a broader investigation into disappearances of young women (ages 16–22, primarily Miqo\'te, Hyur, and Au Ra, from poor/refugee backgrounds) around Ul\'dah. Working theory: the Lambs are deliberately targeting transformation-prone individuals exposed to Akasa, believing their sensitivity enhances voidsent summoning rituals.' },
        { type: 'p', text: 'During the Ishgard Journey arc, a Lamb group ambushed [[Zekito Silverblood|Zekito]] and [[Nimvaei / Liraz Laskaris|Nimvaei]] between Fallgourd Float and Florentel\'s Spire. The group\'s leader sacrificed herself to summon the [[Blackguard]], a humanoid winged voidsent capable of speech and aether drain. [[Zekito Silverblood|Zekito]] was impaled; [[Nimvaei / Liraz Laskaris|Nimvaei]] killed the Blackguard but retains no memory of the fight.' },
