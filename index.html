  'aether': {
    id: 'aether',
    title: 'Aether',
    subtitle: 'The life energy that permeates Hydaelyn.',
    category: 'lore',
    tags: ['lore', 'hydaelyn', 'magic system'],
    stub: false,
    todos: [],
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Aether** is the energy of [[Hydaelyn]] — it is all around and within all living things. All magic on Hydaelyn is derived from aether. It exists in six aspects and two polarities.' },
      ]},
      { id: 'forms', heading: 'Forms of Aether', content: [
        { type: 'ul', items: [
          '**Corporeal** — the aetherpool within a living body, used for casting spells.',
          '**Spiritual** — tied to mind and soul; the aether of consciousness and identity.',
          '**Ambiental / Environmental** — unbound aether that exists throughout the world, ambient in air, stone, water, and living things.',
          '**Surface Aether** (subset) — the unbound leftover of spent aetherial bodies such as cast spells or the residue of people. Primarily used by Conjurers and Red Mages. Usually too thin to distinguish from ambiental aether.',
        ]},
        { type: 'p', text: '*Aether released upon death returns to the aetherial sea from which all life begins. Only so much can cross at a time — excess remains as glowing mist, crystals, or ghostly apparitions. More violent deaths yield more excess.*' },
      ]},
      { id: 'polarity', heading: 'Polarity — Umbral & Astral', content: [
        { type: 'p', text: 'Polarity describes aetherial **frequency**. Umbral (Stasis): frequency 1,000–9,800. Astral (Activity): frequency 10,200–20,000.' },
        { type: 'table', headers: ['Element', 'Umbral State', 'Astral State', 'Natural Tendency'],
          rows: [
            ['Ice', 'Frost / controlled ice', 'Explosive blizzard', 'Naturally Umbral — easiest to control'],
            ['Earth', 'Solid rock', 'Dust, quicksand', ''],
            ['Water', 'Stagnant lake', 'Jet that cuts through stone', ''],
            ['Wind', 'Still air', 'Cutting gale', ''],
            ['Fire', 'Dry haze', 'Consuming flame', ''],
            ['Levin', 'Electromagnetism / EMP', 'Lightning', 'Naturally Astral — hardest to tame'],
          ]
        },
        { type: 'p', text: 'Character **alignment** describes which element their aether naturally resonates with. Casting the same element repeatedly causes aspecting — your aetherpool drifts toward that element and becomes unstable. Counterbalancing with the opposite element stabilizes it (astral fire ↔ umbral ice).' },
      ]},
      { id: 'elements', heading: 'Elemental Interactions', content: [
        { type: 'p', text: '**Conquests (strong against):** Earth grounds Lightning. Water erodes Earth. Lightning boils Water.' },
        { type: 'p', text: '**Submissions (weak against):** Fire is extinguished by Wind. Ice is melted by Fire. Wind is obstructed by Ice.' },
        { type: 'p', text: '**Diametric oppositions:** Fire ↔ Water. Earth ↔ Wind. Ice ↔ Lightning.' },
      ]},
      { id: 'crystallization', heading: 'Crystallization', content: [
        { type: 'ul', items: [
          '**Astral crystallization:** Slowly increase frequency to ~1,800 then spike to ~3,600 in under 0.1 seconds. If the spike fails, aether destabilizes and causes an aetherial explosion.',
          '**Umbral crystallization:** Bring frequency to 0 — temporary; aether will naturally stir back toward the 1,000 minimal-stability mark.',
        ]},
      ]},
      { id: 'disturbance', heading: 'Aetherial Disturbance / Soul Dissonance', content: [
        { type: 'p', text: 'Caused by the body not recognizing its own aether as belonging to it — most commonly when a foreign soul inhabits a body not matched to its aetherial signature. Symptoms: excruciating pain, increased aether consumption, sporadic loss of bodily control, body functions beginning to fail.' },
        { type: 'p', text: '[[Zekito Silverblood|Zekito\'s]] version: his demigod soul is too large for the Miqo\'te body it was placed in. The body\'s aetherial signature rejects the foreign soul. Managed (not cured) by special magitek armour, and later partially resolved by [[Lunair Blackwind]]\'s procedure.' },
      ]},
    ],
  },

  'fomorian-blood': {
    id: 'fomorian-blood',
    title: 'Fomorian Blood',
    subtitle: 'Ancient, powerful, hungry.',
    category: 'lore',
    tags: ['lore', 'erinn', 'fomor'],
    stub: false,
    todos: [],
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Fomorians** are ancient beings of primal magic in [[Erinn]]. Their core nature: they are life-consumers. They feed on [[Aether|aether]], on life. Half-breeds — those born of Fomor and human — inherit this nature, often without the instinctive knowledge of how to manage it.' },
      ]},
      { id: 'expression', heading: 'Expression in Half-Breeds', content: [
        { type: 'ul', items: [
          '**Immense physical capability and magic potential**',
          "**Berserk states:** Primal rages triggered by extreme emotional or physical stress. The host loses all reason and attacks anyone nearby — friend or foe. [[Zekito Silverblood|Zekito]] entered this state at the vampire count encounter. [[Mewecho]] entered it during the Iria dragon battle.",
          "**Void's Hunger:** The ability to absorb aether from any touched object or creature. Not a learned technique — it is the Fomor nature itself, refined into something controlled.",
          '**Life-consumption:** The deeper nature. At full expression (full berserk with no bracelet suppression), the half-breed feeds on life itself.',
        ]},
      ]},
      { id: 'suppression', heading: 'Suppression', content: [
        { type: 'p', text: 'Bracelets enchanted by powerful mages passively amass ambient aether for the host to feed on — removing the need to prey on living beings. The bracelet does not eliminate the blood. It channels the hunger away from living targets. Remove the bracelet and the hunger breaks through.' },
        { type: 'p', text: '[[Zekito Silverblood|Zekito\'s]] [[The Bracelet|bracelet]] was crafted and enhanced by [[Merlin]]. It additionally serves as an aetherial storage vessel for his demigod soul (9/10 initially, 8/10 after [[Lunair Blackwind]]\'s procedure).' },
      ]},
    ],
  },

    tags: ['lore', 'hydaelyn', 'mores'],

    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Oversoul** is a forbidden technique developed by [[Mores Gwydion]] over 35 years of study, allowing the transfer of one\'s soul into another living body. It is the method by which [[Mores Gwydion|Mores]] has kept himself alive for over a century.' },

      { id: 'mechanics', heading: 'Mechanics', content: [
        { type: 'ul', items: [
          'Requires the host to be alive at time of transfer.',
          'Every three years, the host body begins crystallizing from Soul Dissonance — the host\'s aether fighting the foreign soul, destabilizing aetherial balance. This creates what is publicly known as **Blackram Disease**.',
          'Hosts die from the disease if [[Mores Gwydion|Mores]] does not transfer in time.',
          '[[Mores Gwydion|Mores]] attempted to Oversoul into [[Luvsan]] but was rejected by Luvsan\'s rage — leaving Luvsan as a cursed shade sustained by a single drive.',

            ['1538–1557', 'Various hosts (partially documented)'],
            ['~1558', 'Geciro Teciro (Lociro\'s brother)'],
            ['~1562+', 'Various hosts including Galene Didanc\'s mother (1576)'],
            ['1582', 'Orraux Clauvier — current vessel at start of [[Runes of Chimera]]'],
          ]
        },

  'woeborn': {

    title: 'Woeborn',
    subtitle: 'A sword forged in honour. Filled with grief.',
    category: 'artifact',
    tags: ['artifact', 'hydaelyn', 'nidhogg', 'mores'],
    stub: false,
    todos: [],
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Woeborn** is a sword forged from one of Nidhogg\'s scales. It was made in [[Mores Gwydion|Mores Gwydion\'s]] honour while he was presumed dead following the battle with Nidhogg in 1520. He did not forge it himself — others made it for him. When he recovered from stasis to find his family slaughtered and his daughter [[Mari]] taken, Woeborn became the vessel he used to preserve what remained of her soul.' },
      ]},
      { id: 'contents', heading: 'Contents (End of Story)', content: [
        { type: 'ul', items: [
          '**Nidhogg\'s hunger/rage** — the baseline. It tries to consume souls confined within.',
          '**[[Luvsan]]** — dormant, after passing the torch to [[Nimvaei / Liraz Laskaris|Liraz]].',
          '**[[Mores Gwydion|Mores]]** — dormant, eventually at peace. He is with [[Mari]] again, in a sense.',
          '**Nimvaei** — [[Nimvaei / Liraz Laskaris|Liraz\'s]] living shadow. Summonable. The good, fully merged with the bad.',

        { type: 'p', text: 'The sword is soul-bound to [[Nimvaei / Liraz Laskaris|Liraz]]. Half of her soul IS the sword. All inhabitants can communicate with her telepathically.' },

      { id: 'trance', heading: 'Connection to the Trance', content: [
        { type: 'p', text: '[[Nimvaei / Liraz Laskaris|Nimvaei\'s]] first involuntary [[Nimvaei / Liraz Laskaris#trance|Trance]] was triggered when someone stabbed her with Woeborn, forcing the draconic fusion on her. Every subsequent activation requires self-stabbing and winning a battle of wills against Nidhogg\'s rage.' },
      ]},
    ],

      { id: 'overview', heading: null, content: [
        { type: 'p', text: 'The **Lambs of Dalamud** are a fractured religious cult operating across multiple regions of [[Hydaelyn]]. They summon voidsent by sacrificing captives or themselves. Multiple semi-independent sects with infrequent communication operate across Northern Thanalan, South Shroud (Amdapor Ruins), and North Shroud.' },
        { type: 'p', text: 'They fell on hard times after the Final Days when captives they held began transforming into monsters and turned on their own ranks. Their operations continued regardless — they are currently running **Operation Dalamud** in Western Coerthas, a revenge operation for the Ahriman incident [[Zekito Silverblood|Zekito]] had been tracking.' },

      { id: 'investigation', heading: "Zekito's Investigation", content: [
        { type: 'p', text: '[[Zekito Silverblood|Zekito]] has been tracking the Lambs as part of a broader investigation into disappearances of young women (ages 16–22, primarily Miqo\'te, Hyur, and Au Ra, from poor/refugee backgrounds) around Ul\'dah. Working theory: the Lambs are deliberately targeting transformation-prone individuals exposed to Akasa, believing their sensitivity enhances voidsent summoning rituals.' },
        { type: 'p', text: 'During the Ishgard Journey arc, a Lamb group ambushed [[Zekito Silverblood|Zekito]] and [[Nimvaei / Liraz Laskaris|Nimvaei]] between Fallgourd Float and Florentel\'s Spire. The group\'s leader sacrificed herself to summon the [[Blackguard]], a humanoid winged voidsent capable of speech and aether drain. [[Zekito Silverblood|Zekito]] was impaled; [[Nimvaei / Liraz Laskaris|Nimvaei]] killed the Blackguard but retains no memory of the fight.' },

  'runes-of-chimera': {
    id: 'runes-of-chimera',
    title: 'Runes of Chimera',
    subtitle: 'A small-scale story-driven RPG. A prototype for something much larger.',
    category: 'project',
    tags: ['project', 'hydaelyn', 'game'],
    stub: false,
    todos: [
      'Full Nimvaei lore specific to Runes of Chimera',
      'Lunar Rose Academy character roster',
    ],
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Runes of Chimera** is a small-scale story-driven RPG targeting the FFXIV roleplay community. It serves as a prototype for the much larger [[Lunar Rose Academy (Game)|Lunar Rose Academy game]], building the core framework — combat, dialogue integration, character mechanics — at manageable scope.' },
        { type: 'p', text: 'Timeline placement: **after [[Fury\'s Gaze|the Fury\'s Gaze arc]], before the Umbra arc.**' },
      ]},
      { id: 'story', heading: 'Story Summary', content: [
        { type: 'p', text: '[[Zekito Silverblood|Zekito]] and [[Nimvaei / Liraz Laskaris|Nimvaei]] recover ancient arcanima (runes) from Belah\'dian ruins. Unable to decipher them, they seek help from **Orraux Clauvier** — an arcanist-medic at Camp Dragonhead — who agrees to decipher the runes in exchange for a chimera\'s core, claiming it cures Blackram disease afflicting his daughter Edrette.' },
        { type: 'p', text: 'What follows is a quest across [[Hydaelyn|Eorzea]] to gather six specific ingredients, each tied to one of [[Nimvaei / Liraz Laskaris|Nimvaei\'s]] six elemental runes.' },
        { type: 'table', headers: ['Order', 'Rune', 'Location', 'Puzzle', 'Prerequisite'],
          rows: [
            ['1', 'Ice', "Fury's Gaze, Coerthas", 'Chimera boss fight (fire melts ice wall)', 'None'],
            ['2', 'Water', 'Camp Bronze Lake, Vylbrand', "Use Ice to shield from Oschon's gale", 'Ice'],
            ['3', 'Earth', 'The Shroud (20.3, 30.9)', 'Use Water to defeat corrupted earth elemental', 'Water'],
            ['4', 'Levin', 'Anyx Minor, Dravanian Forelands', 'Recover Mari mammet from lightning dragon', 'Earth'],
            ['5', 'Fire', "Amalj'aa camp, S. Thanalan (35.1, 19.9)", 'Rune-matching wire puzzle', 'Levin'],
            ['6', 'Wind', 'Red Rim, Coerthas Western Highlands', '[[Woeborn]] sword realm fight with [[Nimvaei / Liraz Laskaris|Liraz]]', 'Fire'],
          ]
        },
      ]},
      { id: 'twist', heading: 'The Twist', content: [
        { type: 'p', text: 'Orraux is not Orraux. He is [[Mores Gwydion]] — who wrote the book on the ruins himself and engineered the entire quest. [[Zekito Silverblood|Zekito]] caught the scent of his intent early and was immobilised to prevent interference. The reveal scene:' },
        { type: 'rp', lines: [
          { speaker: 'Mores (as Orraux)', text: '"Oh you poor, gullible fool... I wrote that book so that you would go around fetching the materials I needed to bring her back once they matured."' },
          { speaker: '', text: '[looks to Zekito]' },
          { speaker: 'Mores', text: '"At least that one was sharp enough to catch scent of my intent. As much as it pains me to hold him thus in his wounded state, I couldn\'t have him interfere."' },
          { empty: true },
          { speaker: 'Nimvaei', text: '"So then... enlighten this poor fool. Why do you need my blade? Why did you need us to gather all of those materials?"' },
          { empty: true },
          { speaker: 'Mores', text: '"Your blade?" [scoffs] "That blade is mine, girl. Forged for me — as in it, resides my daughter\'s soul. The bloody beasts attacked my home, took my daughter to use her in their unholy experiments. Her soul resides in that blade. It was the only way I could keep her safe."' },
          { empty: true },
          { speaker: 'Mores', text: '"I tried and tried to revive her but the soul is a stubborn thing. I realized I couldn\'t just stuff her soul into a new body — she needed a body to match, to accept her soul."' },
          { empty: true },
          { speaker: 'Mores', text: '"So I set out to infuse bits of her soul into the missing two elements, awaiting for the day all those elements would harmonize to the signature of her soul. After long years of waiting, it is finally ready. All that is left is to use the same cursed technique to merge them all into a vessel!"' },
          { speaker: '', text: '[points toward Mammet Mari]' },
          { speaker: 'Mores', text: '"Oversoul — her end... and her beginning."' },
        ]},
      ]},
      { id: 'ending', heading: 'Ending', content: [
        { type: 'p', text: 'With help from [[Luvsan]] (dormant in [[Woeborn]]) and the mammet [[Mari]], [[Nimvaei / Liraz Laskaris|Nimvaei]] pulls [[Mores Gwydion|Mores\']] soul from Orraux\'s body into [[Woeborn]], where Nidhogg\'s hunger confines him. Orraux is left comatose. [[Mores Gwydion|Mores]], dormant in the blade, eventually comes to peace — he is with [[Mari]] again, in a sense.' },
        { type: 'p', text: 'The journal [[Mores Gwydion|Mores]] wrote for [[Mari]] — explaining everything he did and why — remains at the Blackram clinic for Edrette and the other patients. It makes it to her, just not the way he planned.' },
      ]},
      { id: 'woeborn-fight-detail', heading: 'The Woeborn Fight — RP Log', content: [
        { type: 'p', text: 'Rune 6 (Wind), at Red Rim. [[Nimvaei / Liraz Laskaris|Liraz]] faces the shade of [[Luvsan]] inside the sword realm. This forces her to relive the memory of killing him — and finally understand what she had actually been seeing:' },
        { type: 'rp', lines: [
          { speaker: 'Nimvaei (1/7)', text: 'It was within those sparse few moments that the shade wrapped its arms around her that the world around her seemed to freeze... It was almost enlightening, emphasising that of which she had gradually allowed herself to believe. Despite his beastly actions, and how fearsome they are, he was in the end...' },
          { speaker: 'Nimvaei (2/7)', text: 'Still human, still wishing to protect those that he loved... Her arms dropped as Liraz found herself drawn into a memory of days long gone... Of the days where she found herself shoved into the cart with numerous other women, all awaiting their inevitable slavery at some brothel Auria owned. This Dark Knight...' },
          { speaker: 'Nimvaei (3/7)', text: 'He had been there, slaughtering Auria\'s men left, right and centre... He had been naught more then a pain in her side for years, ruining her operations... It had been left up to her to put an end to him, less she wished to suffer the consequences; the look Auria had given her back then, the way her eyes seemed to take her apart piece by piece...' },
          { speaker: 'Nimvaei (4/7)', text: '...And then he was there, making her breathing come to a full stop, almost and her mind, body... It all screamed to RUN, to get this thing away... But she had a job to do. A job to complete before she could even give into her flight response.' },
          { speaker: 'Nimvaei (5/7)', text: 'The knife plunged into his exposed neck, the warm liquid pouring out onto her hands... She reacted swiftly and pulled it out, only granting herself a few brief moments to watch his body collapse on itself; the other girls screaming in fear. But none of that mattered, back then... She was safe. She didn\'t care. Finally.' },
          { speaker: 'Nimvaei (6/7)', text: 'Liraz would pull herself out from the memory... she understood what it all meant now, how wrong she had perceived it. Her gaze drifting towards the dutiful shade that now stood by her shade... a sense of security blossoming within as a shadowy blade formed within her hands.' },
          { speaker: 'Nimvaei (7/7)', text: '"So... One more trial left then, huh? What\'s it gonna be?"' },
          { empty: true },
          { ooc: '(( Damn ... ))' },
        ]},
      ]},
      { id: 'combat', heading: 'Combat System Design', content: [
        { type: 'subsection', text: "Nimvaei — Elemental Rune Magic" },
        { type: 'p', text: 'As [[Nimvaei / Liraz Laskaris|Nimvaei]] acquires runes, her magic panel expands. Each rune has distinct effects beyond damage type. Elemental weaknesses apply against enemies with defined compositions. Ice first was [[Zekito Silverblood|Zekito\'s]] deliberate pedagogical choice — build control before chaos. Fire (her natural alignment) as the fifth rune means acquiring it feels like a homecoming. Her endpoint: Runic Dark Knight — a synthesis of rune magic (methodical, elemental) and [[Nimvaei / Liraz Laskaris|Liraz\'s]] inherited Dark Knight abilities (instinctive, abyssal).' },
        { type: 'subsection', text: "Zekito — Chain Combo System" },

// ─── UTILS ────────────────────────────────────────────────────

function parseText(text, navigate) {
  if (!text) return null;
  const parts = [];
  let remaining = text;
  // Handle [[target|display]] and [[target]]
  const linkRe = /\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g;
  let lastIdx = 0;
  let match;
  // Also handle **bold** and *italic*
  const fullRe = /(\[\[([^\]|]+)(?:\|([^\]]+))?\]\]|\*\*([^*]+)\*\*|_([^_]+)_)/g;
  const segments = [];
  let li = 0;
  while ((match = fullRe.exec(remaining)) !== null) {
    if (match.index > li) {
      segments.push({ type: 'text', text: remaining.slice(li, match.index) });
    }
    if (match[0].startsWith('[[')) {
      const target = match[2];
      const display = match[3] || target;
      const id = LINK_MAP[target] || LINK_MAP[target.replace(/#.*$/, '')];
      segments.push({ type: 'link', target, display, id });
    } else if (match[0].startsWith('**')) {
      segments.push({ type: 'bold', text: match[4] });
    } else if (match[0].startsWith('_') || match[0].startsWith('*_')) {
      segments.push({ type: 'italic', text: match[5] });
    }
    li = match.index + match[0].length;
  }
  if (li < remaining.length) {
    segments.push({ type: 'text', text: remaining.slice(li) });
  }
  return segments.map((s, i) => {
    if (s.type === 'text') return s.text;
    if (s.type === 'bold') return <strong key={i} style={{color: 'var(--silver-3)', fontWeight: 600}}>{s.text}</strong>;
    if (s.type === 'italic') return <em key={i}>{s.text}</em>;
    if (s.type === 'link') {
      const exists = s.id && ARTICLES[s.id];
      return (
        <span
          key={i}
          className={`wikilink ${!exists ? 'dead' : ''}`}
          onClick={() => exists && navigate(s.id)}
        >
          {s.display}
        </span>
      );
    }
    return null;
  });
}

function buildSearchIndex() {
  return Object.values(ARTICLES).filter(a => a.id !== 'home' && a.id !== 'timeline').map(a => {
    let text = [a.title, a.subtitle || ''];
    if (a.sections) {
      a.sections.forEach(s => {
        if (s.content) s.content.forEach(c => {
          if (c.type === 'p') text.push(c.text);
          if (c.type === 'ul') c.items?.forEach(i => text.push(i));
        });
      });
    }
    return {
      id: a.id,
      title: a.title,
      category: a.category,
      stub: a.stub,
      searchText: text.join(' '),
    };
  });
}

function RichText({ text, navigate }) {
  return <>{parseText(text, navigate)}</>;
}

function ContentBlock({ block, navigate }) {
  switch (block.type) {
    case 'p':
      return <p className="article-p"><RichText text={block.text} navigate={navigate} /></p>;
    case 'quote':
      return <blockquote className="wiki-quote"><RichText text={block.text} navigate={navigate} /></blockquote>;
    case 'subsection':
      return <h4 className="subsection-heading">{block.text}</h4>;
    case 'ul':
      return (
        <ul className="article-ul">
          {(block.items || []).map((item, i) => (
            <li key={i}><RichText text={item} navigate={navigate} /></li>
          ))}
        </ul>
      );
    case 'table':
      return (
        <div className="wiki-table-wrap">
          <table className="wiki-table">
            <thead>
              <tr>{(block.headers || []).map((h, i) => <th key={i}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {(block.rows || []).map((row, ri) => (
                <tr key={ri}>
                  {row.map((cell, ci) => (
                    <td key={ci}><RichText text={cell} navigate={navigate} /></td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    case 'rp':
      return (
        <div className="rp-log">
          {(block.lines || []).map((line, i) => {
            if (line.empty) return <div key={i} className="rp-line empty" />;
            if (line.ooc) return <div key={i} className="rp-line"><span className="rp-ooc">{line.ooc}</span></div>;
            return (
              <div key={i} className="rp-line">
                {line.speaker && <span className="rp-speaker">{line.speaker}: </span>}
                {line.text}
              </div>
            );
          })}
        </div>
      );
    default:
      return null;
  }
}

function Infobox({ data }) {
  const [activeTab, setActiveTab] = useState(0);
  if (!data) return null;
  const hasTabs = data.imageTabs && data.imageTabs.length > 0;
  const activeImage = hasTabs ? data.imageTabs[activeTab] : null;
  const groups = data.groups || (data.fields ? [{ heading: null, fields: data.fields }] : []);

  return (
    <div className="infobox">
      <div className="infobox-title">{data.title}</div>
      {hasTabs && (
        <>
          <div className="infobox-image-tabs">
            {data.imageTabs.map((tab, i) => (
              <div key={i} className={`infobox-image-tab ${activeTab === i ? 'active' : ''}`} onClick={() => setActiveTab(i)}>
                {tab.label}
              </div>
            ))}
          </div>
          <div className="infobox-image-area">
            {activeImage?.src
              ? <img src={activeImage.src} alt={activeImage.label} />
              : <span className="infobox-image-placeholder">[ {activeImage?.label} — image pending ]</span>
            }
            {activeImage?.caption && <span className="infobox-image-caption">{activeImage.caption}</span>}
          </div>
        </>
      )}
      {groups.map((group, gi) => (
        <React.Fragment key={gi}>
          {group.heading && <div className="infobox-group-header">{group.heading}</div>}
          {(group.fields || []).map(([label, value], i) => (
            <div key={i} className="infobox-row">
              <div className="infobox-label">{label}</div>
              <div className="infobox-value">{value}</div>
            </div>
          ))}
        </React.Fragment>
      ))}
    </div>
  );
}

function TableOfContents({ sections }) {
  const numbered = sections.filter(s => s.heading);
  if (numbered.length < 3) return null;
  const scrollTo = (id) => {
    const el = document.getElementById('section-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  return (
    <div className="toc">
      <div className="toc-title">Contents</div>
      <ol className="toc-list">
        {numbered.map((section, i) => (
          <li key={section.id} className="toc-item">
            <a onClick={() => scrollTo(section.id)}>
              <span className="toc-num">{i + 1}.</span>
              <span>{section.heading}</span>
            </a>
            {section.subsections && section.subsections.length > 0 && (
              <ol className="toc-sublist">
                {section.subsections.map((sub, j) => (
                  <li key={j} className="toc-subitem">
                    <a onClick={() => scrollTo(section.id + '-' + j)}>
                      <span className="toc-num" style={{width: 28}}>{i + 1}.{j + 1}</span>
                      <span>{sub}</span>
                    </a>
                  </li>
                ))}
              </ol>
            )}
          </li>
        ))}
      </ol>
    </div>
  );
}

function Sidebar({ page, navigate, open, setOpen }) {
  const [openSections, setOpenSections] = useState(() => {
    const init = {};
    NAV.forEach(s => { init[s.id] = s.open; });
    return init;
  });
  const [search, setSearch] = useState('');
  const [results, setResults] = useState([]);
  const fuseRef = useRef(null);

  useEffect(() => {
    const index = buildSearchIndex();
    fuseRef.current = new Fuse(index, {
      keys: ['title', 'searchText'],
      threshold: 0.35,
      minMatchCharLength: 2,
    });
  }, []);

  const handleSearch = (q) => {
    setSearch(q);
    if (!q.trim() || !fuseRef.current) { setResults([]); return; }
    const res = fuseRef.current.search(q).slice(0, 8);
    setResults(res.map(r => r.item));
  };

  const toggle = (id) => setOpenSections(prev => ({ ...prev, [id]: !prev[id] }));

  return (
    <nav className={`wiki-sidebar ${open ? 'open' : ''}`}>
      <div className="sidebar-logo">
        <h1>Fantasy Tales<span>The Wiki</span></h1>
      </div>
      <div className="sidebar-search">
        <span className="search-icon">🔍</span>
        <input
          type="text"
          placeholder="Search articles..."
          value={search}
          onChange={e => handleSearch(e.target.value)}
          onBlur={() => setTimeout(() => setResults([]), 200)}
        />
        {results.length > 0 && (
          <div className="search-results">
            {results.map(r => (
              <div key={r.id} className="search-result-item" onMouseDown={() => { navigate(r.id); setSearch(''); setResults([]); }}>
                <div className="search-result-title">{r.title}{r.stub ? ' ✏' : ''}</div>
                <div className="search-result-cat">{r.category}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div className="sidebar-nav">
        {NAV.map(section => (
          <div key={section.id} className="nav-section">
            <div
              className={`nav-section-header ${openSections[section.id] ? 'open' : ''}`}
              onClick={() => toggle(section.id)}
            >
              <span>{section.icon}</span>
              <span>{section.label}</span>
              <span className="chevron">▶</span>
            </div>
            {openSections[section.id] && (
              <div className="nav-items">
                {section.items.map(item => (
                  <div
                    key={item.id}
                    className={`nav-item ${page === item.id ? 'active' : ''}`}
                    onClick={() => navigate(item.id)}
                  >
                    {item.label}
                    {item.stub && <span className="stub-dot" title="Stub article" />}
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </nav>
  );
}

function App() {
  const [page, setPage] = useState('home');
  const [sidebarOpen, setSidebarOpen] = useState(false);

  useEffect(() => {
    const handle = () => {
      const hash = window.location.hash.slice(1);
      setPage(hash || 'home');
    };
    window.addEventListener('hashchange', handle);
    handle();
    return () => window.removeEventListener('hashchange', handle);
  }, []);

  const navigate = useCallback((id) => {
    window.location.hash = id;
    setSidebarOpen(false);
    window.scrollTo(0, 0);
  }, []);

  const article = ARTICLES[page];
  const breadcrumb = (() => {
    if (page === 'home') return null;
    if (page === 'timeline') return [{ label: 'Reference' }];
    if (!article) return null;
    const catLabel = {
      character: 'Characters', world: 'Worlds', lore: 'Lore & Systems',
      faction: 'Factions', location: 'Locations', artifact: 'Artifacts',
      project: 'Story & Projects',
    }[article.category] || article.category;
    return [{ label: catLabel }];
  })();

  return (
    <div className="wiki-shell">
      <Sidebar page={page} navigate={navigate} open={sidebarOpen} setOpen={setSidebarOpen} />
      <div className="wiki-main">
        <div className="wiki-topbar">
          <button className="mobile-toggle" onClick={() => setSidebarOpen(o => !o)}>☰</button>
          <div className="topbar-breadcrumb">
            <span style={{cursor:'pointer'}} onClick={() => navigate('home')}>Wiki</span>
            {breadcrumb && breadcrumb.map((b, i) => (
              <React.Fragment key={i}>
                <span className="sep">›</span>
                <span>{b.label}</span>
              </React.Fragment>
            ))}
            {page !== 'home' && page !== 'timeline' && article && (
              <>
                <span className="sep">›</span>
                <span style={{color:'var(--silver-2)'}}>{article.title}</span>
              </>
            )}
          </div>
        </div>
        <div className="wiki-content">
          {page === 'home' && <HomePage navigate={navigate} />}
          {page === 'timeline' && <TimelinePage navigate={navigate} />}
          {page !== 'home' && page !== 'timeline' && article && (
            <ArticlePage article={article} navigate={navigate} />
          )}
          {page !== 'home' && page !== 'timeline' && !article && (
            <div style={{textAlign:'center', padding:'60px 0', color:'var(--text-3)'}}>
              <div style={{fontSize:'48px', marginBottom:'16px'}}>◇</div>
              <h2 style={{fontFamily:'Cinzel,serif', color:'var(--silver)', marginBottom:'8px'}}>Article Not Found</h2>
              <p>This page doesn't exist yet. <span className="wikilink" onClick={() => navigate('home')}>Return home →</span></p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
