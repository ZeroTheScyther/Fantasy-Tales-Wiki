<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Tales Wiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.basic.min.js"></script>
<style>
:root {
  --bg:          #0b0b16;
  --bg-2:        #0e0e1c;
  --bg-3:        #131328;
  --bg-card:     #15152a;
  --bg-hover:    #1a1a32;
  --red:         #7a1010;
  --red-2:       #9b1515;
  --red-bright:  #c0392b;
  --red-muted:   #3a0a0a;
  --silver:      #9090b0;
  --silver-2:    #b0b0cc;
  --silver-3:    #d0d0e8;
  --text:        #cccce0;
  --text-2:      #8888a8;
  --text-3:      #505068;
  --border:      #1c1c30;
  --border-2:    #262640;
  --border-red:  #2e0e0e;
  --amber:       #c09010;
  --amber-bg:    #1a1400;
  --amber-border:#3a2800;
  --green:       #2a7a2a;
  --sidebar-w:   280px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 17px;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: var(--silver-2); text-decoration: none; cursor: pointer; }
a:hover { color: var(--silver-3); text-decoration: underline; }

/* ── LAYOUT ───────────────────────────────────────────── */

.wiki-shell {
  display: flex;
  min-height: 100vh;
}

.wiki-sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
}

.wiki-main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.wiki-topbar {
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.wiki-content {
  flex: 1;
  max-width: 900px;
  padding: 40px 48px 80px;
  margin: 0 auto;
  width: 100%;
}

/* ── SIDEBAR ──────────────────────────────────────────── */

.sidebar-logo {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--border-red);
}

.sidebar-logo h1 {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--silver-3);
  line-height: 1.3;
}

.sidebar-logo span {
  display: block;
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--red-2);
  margin-top: 2px;
}

.sidebar-search {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.sidebar-search input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border-2);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  padding: 7px 12px 7px 32px;
  outline: none;
  transition: border-color 0.2s;
}

.sidebar-search input::placeholder { color: var(--text-3); }
.sidebar-search input:focus { border-color: var(--red-2); }

.sidebar-search .search-icon {
  position: absolute;
  left: 24px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  font-size: 13px;
  pointer-events: none;
}

.search-results {
  position: absolute;
  top: calc(100% - 2px);
  left: 14px;
  right: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: 0 0 4px 4px;
  z-index: 200;
  max-height: 320px;
  overflow-y: auto;
}

.search-result-item {
  padding: 8px 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.search-result-item:hover { background: var(--bg-hover); }
.search-result-item:last-child { border-bottom: none; }

.search-result-title {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--silver-3);
}

.search-result-cat {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  color: var(--text-3);
  margin-top: 1px;
  text-transform: capitalize;
}

.sidebar-nav {
  padding: 8px 0 24px;
  flex: 1;
}

.nav-section {
  margin-bottom: 4px;
}

.nav-section-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 16px;
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
}

.nav-section-header:hover { color: var(--text-2); }

.nav-section-header .chevron {
  margin-left: auto;
  transition: transform 0.2s;
  font-size: 9px;
}

.nav-section-header.open .chevron { transform: rotate(90deg); }

.nav-items {
  overflow: hidden;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 16px 5px 26px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
}

.nav-item:hover {
  color: var(--silver-2);
  background: var(--bg-hover);
  border-left-color: var(--border-2);
}

.nav-item.active {
  color: var(--silver-3);
  background: var(--bg-3);
  border-left-color: var(--red-2);
}

.stub-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--amber);
  flex-shrink: 0;
  margin-left: auto;
}

/* ── TOPBAR ───────────────────────────────────────────── */

.topbar-breadcrumb {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}

.topbar-breadcrumb span { color: var(--text-2); }
.topbar-breadcrumb .sep { color: var(--text-3); }

/* ── ARTICLE ──────────────────────────────────────────── */

.article-header {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.article-categories {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.category-tag {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--red-2);
  background: var(--red-muted);
  border: 1px solid var(--border-red);
  border-radius: 3px;
  padding: 2px 7px;
}

.article-title {
  font-family: 'Cinzel', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--silver-3);
  line-height: 1.2;
  margin-bottom: 6px;
}

.article-subtitle {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--text-2);
}

/* ── STUB NOTICE ──────────────────────────────────────── */

.stub-notice {
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  border-left: 3px solid var(--amber);
  border-radius: 4px;
  padding: 12px 16px;
  margin-bottom: 24px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.stub-notice-icon {
  font-size: 18px;
  flex-shrink: 0;
  margin-top: 1px;
}

.stub-notice-body {
  flex: 1;
}

.stub-notice-title {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 4px;
}

.stub-notice-body p {
  font-size: 14px;
  color: var(--text-2);
  margin-bottom: 6px;
}

.stub-todo-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.stub-todo-list li {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  color: var(--text-2);
  display: flex;
  align-items: flex-start;
  gap: 6px;
}

.stub-todo-list li::before {
  content: '○';
  color: var(--amber);
  flex-shrink: 0;
  margin-top: 1px;
}

/* ── ARTICLE BODY ─────────────────────────────────────── */

.article-with-infobox {
  display: flex;
  gap: 28px;
  align-items: flex-start;
}

.article-body {
  flex: 1;
  min-width: 0;
}

.article-lead {
  font-size: 18px;
  line-height: 1.65;
  margin-bottom: 24px;
}

.article-section {
  margin-bottom: 28px;
}

.section-heading {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--silver-2);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-heading::after {
  content: '';
  display: block;
  width: 20px;
  height: 1px;
  background: var(--red-2);
  margin-left: 4px;
}

.subsection-heading {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--silver);
  margin-bottom: 10px;
  margin-top: 18px;
}

.article-p {
  margin-bottom: 12px;
  color: var(--text);
}

.article-ul {
  list-style: none;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.article-ul li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding-left: 4px;
}

.article-ul li::before {
  content: '◆';
  color: var(--red-2);
  font-size: 8px;
  flex-shrink: 0;
  margin-top: 7px;
}

/* ── INFOBOX ──────────────────────────────────────────── */

.infobox {
  width: 260px;
  min-width: 260px;
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-top: 3px solid var(--red-2);
  border-radius: 0 0 4px 4px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  flex-shrink: 0;
}

.infobox-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  padding: 10px 12px 8px;
  color: var(--silver-3);
  border-bottom: 1px solid var(--border);
}

.infobox-image-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.infobox-image-tab {
  flex: 1;
  padding: 5px 4px;
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-align: center;
  color: var(--text-3);
  cursor: pointer;
  border-right: 1px solid var(--border);
  transition: all 0.15s;
  user-select: none;
}

.infobox-image-tab:last-child { border-right: none; }
.infobox-image-tab:hover { color: var(--text-2); background: var(--bg-hover); }
.infobox-image-tab.active { color: var(--silver-2); background: var(--red-muted); border-bottom: 2px solid var(--red-2); }

.infobox-image-area {
  background: var(--bg-3);
  min-height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  gap: 6px;
}

.infobox-image-placeholder {
  font-size: 11px;
  color: var(--text-3);
  font-style: italic;
  text-align: center;
}

.infobox-image-caption {
  font-size: 10px;
  color: var(--text-3);
  text-align: center;
}

.infobox-image-area img {
  max-width: 100%;
  max-height: 200px;
  object-fit: contain;
}

.infobox-group-header {
  padding: 5px 8px 4px;
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--red-2);
  background: var(--red-muted);
  border-bottom: 1px solid var(--border-red);
  border-top: 1px solid var(--border-red);
}

.infobox-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  border-bottom: 1px solid var(--border);
}

.infobox-row:last-child { border-bottom: none; }

.infobox-label {
  padding: 6px 8px;
  color: var(--text-3);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  background: var(--bg-3);
  display: flex;
  align-items: flex-start;
  padding-top: 8px;
}

.infobox-value {
  padding: 6px 8px;
  color: var(--text);
  font-size: 12px;
  line-height: 1.5;
}

/* ── TABLE OF CONTENTS ────────────────────────────────── */

.toc {
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-left: 3px solid var(--red);
  border-radius: 0 4px 4px 0;
  padding: 12px 14px;
  margin-bottom: 24px;
  display: inline-block;
  min-width: 220px;
  max-width: 340px;
}

.toc-title {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--silver-2);
  margin-bottom: 8px;
}

.toc-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.toc-item {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
}

.toc-item a {
  color: var(--silver);
  cursor: pointer;
  display: flex;
  gap: 6px;
  align-items: baseline;
  transition: color 0.15s;
}

.toc-item a:hover { color: var(--silver-3); text-decoration: none; }

.toc-num {
  color: var(--text-3);
  font-size: 11px;
  flex-shrink: 0;
  width: 20px;
}

.toc-sublist {
  list-style: none;
  margin-top: 2px;
  margin-left: 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.toc-subitem {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
}

.toc-subitem a {
  color: var(--text-2);
  cursor: pointer;
  display: flex;
  gap: 5px;
  transition: color 0.15s;
}

.toc-subitem a:hover { color: var(--silver-2); text-decoration: none; }

/* ── TABLES ───────────────────────────────────────────── */

.wiki-table-wrap {
  overflow-x: auto;
  margin-bottom: 16px;
  border: 1px solid var(--border-2);
  border-radius: 4px;
}

.wiki-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}

.wiki-table th {
  background: var(--red-muted);
  color: var(--silver-2);
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 9px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border-red);
}

.wiki-table td {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.5;
}

.wiki-table tr:last-child td { border-bottom: none; }
.wiki-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

/* ── RP LOG ───────────────────────────────────────────── */

.rp-log {
  background: #0a0a14;
  border: 1px solid var(--border-2);
  border-left: 3px solid var(--red);
  border-radius: 0 4px 4px 0;
  padding: 16px 20px;
  margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
}

.rp-line {
  color: var(--text-2);
  margin-bottom: 4px;
}

.rp-line .rp-speaker {
  color: var(--red-bright);
  font-weight: 500;
}

.rp-line .rp-ooc {
  color: var(--text-3);
  font-style: italic;
}

.rp-line.empty {
  height: 10px;
}

/* ── QUOTE ────────────────────────────────────────────── */

.wiki-quote {
  border-left: 3px solid var(--red);
  padding: 10px 18px;
  margin: 16px 0;
  font-style: italic;
  color: var(--text-2);
  font-size: 18px;
  background: rgba(139,20,20,0.06);
}

/* ── WIKILINK ─────────────────────────────────────────── */

.wikilink {
  color: var(--silver-2);
  border-bottom: 1px dotted var(--silver);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.wikilink:hover {
  color: var(--silver-3);
  border-bottom-color: var(--silver-3);
  text-decoration: none;
}

.wikilink.dead {
  color: var(--red-bright);
  border-bottom-color: var(--red-bright);
}

/* ── HOME PAGE ────────────────────────────────────────── */

.home-hero {
  text-align: center;
  padding: 48px 0 40px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
}

.home-hero h1 {
  font-family: 'Cinzel', serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--silver-3);
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.home-hero .tagline {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 20px;
  color: var(--text-2);
  margin-bottom: 20px;
}

.home-hero .divider {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
  margin-bottom: 20px;
}

.home-hero .divider::before,
.home-hero .divider::after {
  content: '';
  width: 60px;
  height: 1px;
  background: var(--red-2);
}

.home-hero .divider-gem {
  color: var(--red-2);
  font-size: 10px;
}

.home-hero .overview {
  max-width: 620px;
  margin: 0 auto;
  color: var(--text-2);
  font-size: 17px;
  line-height: 1.7;
}

.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  margin-bottom: 40px;
}

.home-card {
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: 6px;
  padding: 16px 16px 14px;
  cursor: pointer;
  transition: all 0.2s;
  border-top: 2px solid var(--border-red);
}

.home-card:hover {
  border-top-color: var(--red-2);
  background: var(--bg-hover);
  transform: translateY(-1px);
}

.home-card-icon {
  font-size: 22px;
  margin-bottom: 8px;
}

.home-card-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--silver-2);
  margin-bottom: 4px;
}

.home-card-desc {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.4;
}

.home-section-title {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.home-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── TIMELINE ─────────────────────────────────────────── */

.timeline-page {}

.timeline-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}

.timeline-filter {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 3px;
  border: 1px solid var(--border-2);
  background: var(--bg-card);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
}

.timeline-filter:hover { border-color: var(--silver); color: var(--silver-2); }
.timeline-filter.active { background: var(--red-muted); border-color: var(--red-2); color: var(--silver-2); }

.timeline-list {
  position: relative;
  padding-left: 60px;
}

.timeline-list::before {
  content: '';
  position: absolute;
  left: 30px;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, transparent, var(--red) 5%, var(--red) 95%, transparent);
}

.timeline-event {
  position: relative;
  margin-bottom: 24px;
}

.timeline-year {
  position: absolute;
  left: -60px;
  width: 48px;
  text-align: right;
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--red-2);
  top: 3px;
  line-height: 1.2;
}

.timeline-dot {
  position: absolute;
  left: -36px;
  top: 5px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--bg-2);
  border: 2px solid var(--red);
  transform: translateX(-50%);
}

.timeline-dot.major {
  border-color: var(--red-bright);
  background: var(--red);
  width: 16px;
  height: 16px;
}

.timeline-card {
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: 4px;
  padding: 12px 16px;
}

.timeline-card-tags {
  display: flex;
  gap: 5px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.timeline-tag {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 2px;
}

.timeline-tag.xiv { background: #0d1a2a; color: #4488cc; border: 1px solid #0d2a44; }
.timeline-tag.story { background: var(--red-muted); color: var(--red-bright); border: 1px solid var(--border-red); }
.timeline-tag.blackram { background: #1a1000; color: #aa7700; border: 1px solid #2a1a00; }
.timeline-tag.major { background: #001a00; color: #44aa44; border: 1px solid #002a00; }

.timeline-card-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.6;
}

.timeline-partial {
  font-style: italic;
  color: var(--text-3);
  font-size: 14px;
}

/* ── SCROLLBAR ────────────────────────────────────────── */

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-2); }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--red); }

/* ── RESPONSIVE ───────────────────────────────────────── */

@media (max-width: 900px) {
  .wiki-sidebar { transform: translateX(-100%); transition: transform 0.3s; }
  .wiki-sidebar.open { transform: translateX(0); }
  .wiki-main { margin-left: 0; }
  .wiki-content { padding: 24px 20px 60px; }
  .article-with-infobox { flex-direction: column; }
  .infobox { width: 100%; min-width: 0; }
  .mobile-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-2);
    flex-shrink: 0;
  }
}

@media (min-width: 901px) {
  .mobile-toggle { display: none; }
}
</style>

  // ─── CHARACTERS ──────────────────────────────────────────────

  'zekito-silverblood': {

        { heading: 'Affiliation', fields: [

        ]},
        { heading: 'Occupation', fields: [

          ['Previous', 'Street Rat → Pit Fighter → Adventurer → Blood Knights Captain (Fenrir Unit) → Audacia Councillor → Student (Lunar Rose Academy)'],
        ]},
        { heading: 'Base of Operations', fields: [

          ['Previous', "Audacia Guild Hall → Blood Knights Guild Hall → Lunar Rose Academy → Ishgard apartment → The Silver Bazaar"],
        ]},
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Zekito Silverblood** — also known as **Zek** — is the central protagonist of Fantasy Tales. Half-[[Fomorian Blood|Fomorian]], half-Miqo\'te, he is the son of [[Isanshiro]] (the Silver King) and twin brother of [[Mewecho]]. Born into a kingdom that burned before he could remember it, he has spent two centuries wandering [[Erinn]] and now [[Hydaelyn]], defying the nature of what he is.' },
        { type: 'p', text: 'He is tall, muscular, silver-haired, and red-eyed — an immediately striking presence with cat ears that catch far more than he admits to, and a tail he usually keeps wrapped under his shirt. Despite his appearance, he is outgoing, brash, and audacious. He is also quietly terrified of losing anyone he lets close, and has been running from something for two hundred years.' },
      ]},
      { id: 'appearance', heading: 'Appearance', content: [
        { type: 'table', headers: ['Attribute', 'Detail'],
          rows: [
            ['Hair', 'Silver-white, short and messy in current form. Arrived in Eorzea with dark hair — turned white within 3 years. During the Umbra arc, Nimvaei cut and dyed it black as a disguise.'],
            ['Eyes', 'Red — burning and intense, the gaze of a predator watching prey'],
            ['Height / Weight', "186 cm (6\'1\") / 75 kg (165 lbs)"],
            ['Build', 'Tall, muscular'],
            ['Ears', 'Cat ears — he hears far more than he admits to'],
            ['Tail', 'White and fluffy; usually wrapped under his shirt in company'],
            ['Scars', 'Numerous — torso, arms, legs'],
            ['Signature Colors', 'Red dominant, with black'],
          ]
        },
        { type: 'subsection', text: 'Outfit by Arc' },
        { type: 'table', headers: ['Period', 'Outfit'],
          rows: [
            ['Early Eorzea', 'Black tank top, dark trousers, fingerless gloves. Dark hair.'],
            ['Lunar Rose Uniform', 'Teal blue collared shirt with gold pin detailing, white trousers, white shoes.'],
            ['Lunar Rose Going Out', 'Heavy dark grey long coat with fur-trimmed collar, multiple buckle straps, platform boots, green choker.'],
            ['Combat', 'Black with gold chain detailing, armoured legs, long black coat.'],
            ['Date / Off Duty', 'White dress shirt, red vest, black tie.'],
            ['Cold Weather', 'Brown leather coat with fur trim.'],
            ['Umbra Disguise', 'Hair cut and dyed black by Nimvaei. Dark ears. Stripped-back dark clothes.'],
            ['Current Signature', 'Bold red long coat with fur-trimmed shoulders. Red dominant.'],
          ]
        },
      ]},
      { id: 'personality', heading: 'Personality', content: [
        { type: 'p', text: 'Despite his appearance, Zekito is outgoing. Outspoken, brash, and audacious, loyal to a fault. He leads with confidence and can read a room, hold a conversation, and project ease even in unfamiliar company. But the ease is a performance. Beneath it: quick anger held in check by a lifetime of practice; a terror of losing people that drives him to put everyone else before himself; and an old bone-deep loneliness that no amount of company has ever fully touched.' },
        { type: 'p', text: 'He deflects with humor, explains things in plain terms, and uses physical demonstrations over lectures. He switches registers cleanly — businesslike with clients, warm and teasing with [[Nimvaei / Liraz Laskaris|Nimvaei]]. When his walls come down — a rare event — he speaks differently. Longer sentences, almost poetic. He is not inarticulate. He is usually just choosing not to use that voice.' },
        { type: 'table', headers: ['Trait', 'Detail'],
          rows: [
            ['Positive', 'Kind, honest, loyal, perseverant, brave'],
            ['Negative', 'Impulsive, crude, violent, stubborn'],
            ['Core Flaw', 'Puts others before himself to a self-destructive extreme'],
            ['Fear', 'Losing those close to him'],
            ['Dream', 'Finding a way back home to Erinn'],
            ['Drive', 'His friends'],
            ['Tic', 'Sighing'],
            ['Cope', 'Getting dead drunk'],
            ['Rage Trigger', 'His sister being hurt'],
            ['Habit', 'Always carries a notebook; records research, investigation notes, field observations'],
            ['Likes', 'Whiskey, electric guitars, cellos, sleeping under big trees, fishing, cooking'],
            ['Dislikes', 'Elitists, smartasses, spicy food, being ignored'],
          ]
        },
        { type: 'p', text: '**Fighting style note:** Zekito fights barehanded in 99% of situations and refuses to use a weapon. When asked why, he said simply: *"It\'s harder to take a life that way."*' },
      ]},
      { id: 'history', heading: 'History', subsections: ['Before Memory', 'The Road and the Pit', 'Found Family', 'Audacia', 'The Aces & Merlin', 'The Zealots', 'Arrival in Hydaelyn'], content: [
        { type: 'subsection', text: 'Before Memory (Age ~4)' },
        { type: 'p', text: 'Born in [[Erinn]] to [[Isanshiro]] (the Silver King) and a Fomorian mother. Twin to [[Mewecho]]. At age 4, [[Isanshiro]]\'s castle was besieged by the Knights of Light who opposed the union of man and Fomor. To protect the twins, Isanshiro placed memory seals on both children. Zekito was sent to [[Tir Chonaill]] as a farm boy. Mewecho was sent to the cold northern [[Vales]] — alone.' },
        { type: 'subsection', text: 'The Road and the Pit (Age 10–17)' },
        { type: 'p', text: 'At age 10, his Fomorian blood overpowered the seal. Months of hallucinations ended with him attempting to gut his adoptive father — he was banished. A year as a street rat in [[Dunbarton]], then chased into [[Dugald Forest]] where a massive adventurer punched a bear flat and handed him bread and knuckles: *"If you want to thank me, grow strong. Survive and bring me back my knuckles."* He never found the man. He kept the knuckles. Four years wandering Erinn. Three years in an arena — youngest fighter ever, losing repeatedly then winning. Never took the Champion title. Earned a name.' },
        { type: 'subsection', text: 'Found Family (Age ~17)' },
        { type: 'p', text: 'Returning to [[Tir Chonaill]], he met Jeff — naive, endlessly optimistic, impossible to shake — who introduced him to Odjin, Yuias, and Ajaraka. These five became family. The found family ended at the bottom of a crypt: a vampire count struck down the party, Zekito went feral and nearly killed the people he\'d fought to protect. The party dissolved. Jeff was last — and eventually he too vanished.' },
        { type: 'subsection', text: 'Audacia' },
        { type: 'p', text: 'Years later, he joined [[Audacia]] guild, eventually becoming a Councillor. During the guild conflict with rival guild [[Nixia]], he and officer Nina went to negotiate — and met the Nixia officer who would turn out to be his twin sister [[Mewecho]], though neither of them knew it yet. The truth came on a joint mission through Iria: a dragon, [[Mewecho]]\'s berserk rage felling the beast — and Zekito recognizing her bracelet. He also served as Captain of the Fenrir Unit within the Blood Knights during this period.' },
        { type: 'subsection', text: 'The Aces & Merlin' },
        { type: 'p', text: 'The twins tracked down [[The Aces]] and [[Merlin]], who tested them and enhanced their bracelets. [[Mewecho]] returned to [[Audacia]]. Zekito spent four years travelling with the Aces under [[Merlin]]\'s mentorship — receiving Snap Cast, Spellwalk, and his custom knuckles.' },
        { type: 'subsection', text: 'The Zealots' },
        { type: 'p', text: 'He followed a lead to religious zealots in [[Iria]], stopping at [[Belvast]] first — finding [[Mewecho]] and their father [[Isanshiro]] there, unexpectedly. A day of questioning. No answers about his mother. He followed the trail to the zealot hideout and found his mother: decades of suffering and forced aetherial extraction had turned her into a weapon. There was nothing left to reach. He made the only choice he could. **He killed his mother.**' },
        { type: 'subsection', text: 'Arrival in Hydaelyn' },
        { type: 'p', text: 'How Zekito arrived in [[Hydaelyn]] is not yet documented. He arrived stripped of [[Fomorian Blood|Fomorian power]], reduced to an ordinary sickly Miqo\'te body, hair still dark — the body hadn\'t yet begun reflecting what his soul actually is. Within three years it turned white. Odd jobs in Ul\'dah, training with the Pugilist Guild. Mage Gerel Kha diagnosed his soul dissonance and directed him to [[Lunar Rose Academy]]. Lunar Rose is where the plot begins.' },
      ]},
      { id: 'plots', heading: 'Plots', subsections: ['Lunar Rose Arc', "Fury\'s Gaze Arc", 'Runes of Chimera', 'Umbra Arc'], content: [
        { type: 'subsection', text: 'Lunar Rose Arc' },
        { type: 'p', text: 'Zekito enrolled at [[Lunar Rose Academy]] posing as a student while searching for treatment for his soul dissonance. He met [[Nimvaei / Liraz Laskaris|Nimvaei and Liraz]] here. Concurrently he investigated the Ul\'dah disappearances and the [[Lambs of Dalamud]]. During this arc he and Nimvaei were ambushed by a Lamb group; he was impaled by the Blackguard voidsent. He revealed to Nimvaei that he is not from Hydaelyn and is a half-Fomor — the conversation that changed the shape of what they were to each other.' },
        { type: 'subsection', text: "Fury\'s Gaze Arc" },
        { type: 'p', text: 'Zekito was captured by [[Fury\'s Gaze|Auria\'s facility]]. His bracelet markings were removed; his condition deteriorated to psychosis and animalistic behaviour. Compound Psi was administered on [[Auria Van Varus|Auria]]\'s orders. He escaped containment and slaughtered his way to the 1F elevator before being retrieved by [[Lorelai Lesrekta]]. No bond recorded. No rung. **No status recorded.** [[Cailean Arda]] was watching throughout as [[Umbra]]\'s embedded observer.' },
        { type: 'subsection', text: 'Runes of Chimera' },
        { type: 'p', text: 'Zekito and [[Nimvaei / Liraz Laskaris|Nimvaei]] became entangled with [[Mores Gwydion]] (posing as Orraux Clauvier). Zekito caught the scent of Mores\' intent early and was immobilised to prevent interference. See: [[Runes of Chimera]] for the full arc.' },
        { type: 'subsection', text: 'Umbra Arc' },
        { type: 'p', text: 'During the Umbra arc, [[Nimvaei / Liraz Laskaris|Nimvaei]] cut and dyed his hair black so he could move without being recognized. He told her at the start of this arc — after teaching her Smash — that he has been secretly training her to kill him if he ever loses control. [[Cailean Arda]] and [[Lexus Ovicula]] act as antagonists on [[Umbra]]\'s orders. Full arc details pending.' },
      ]},
      { id: 'equipment', heading: 'Equipment', content: [
        { type: 'subsection', text: 'The Bracelet' },
        { type: 'p', text: 'A mythril bracelet (Auracite in Eorzea terms). Crafted and enhanced by [[Merlin]]. Suppresses [[Fomorian Blood|Fomorian hunger]] by passively amassing ambient aether; attuned to [[Mewecho]]\'s twin bracelet so the siblings can never truly lose each other. Contains 8/10 of his original demigod soul. His plan to return to [[Erinn]]: breach the Crystal Tower, amplify the bracelet\'s attunement until it tears open a portal to [[Mewecho]]\'s bracelet.' },
        { type: 'subsection', text: 'The Knuckles' },
        { type: 'p', text: 'He has carried knuckles since age 11, given to him by the adventurer in [[Dugald Forest]]. When he left [[The Aces]], [[Merlin]] gifted him a custom pair: identical in shape but built to channel high-level magic without a focus. He fights barehanded by default; the knuckles serve as a conduit for his spellwork.' },
      ]},
      { id: 'powers', heading: 'Powers & Abilities', subsections: ['Fomorian Blood', 'Snap Cast & Spellwalk', 'Spell List', 'Aetherial Alignment'], content: [
        { type: 'subsection', text: 'Fomorian Blood' },
        { type: 'p', text: 'Zekito carries powerful [[Fomorian Blood]] from his mother. Grants immense physical capability and magic potential at the cost of control. In extremis he enters a feral berserk state. Beyond that is a full surrender to his voidsent nature he has spent 200 years running from — the reason he has secretly been training [[Nimvaei / Liraz Laskaris|Nimvaei]] to kill him if he loses control.' },
        { type: 'subsection', text: 'Snap Cast & Spellwalk' },
        { type: 'p', text: 'Taught by [[Merlin]]. **Snap Cast:** Chargeable spells fire instantly — the finger snap is the trigger. **Spellwalk:** Spells can be cast while moving. Both considered impossible by Eorzean mage standards. He arrived treating them as completely ordinary.' },
        { type: 'subsection', text: 'Spell List' },
        { type: 'table', headers: ['Spell', 'Description'],
          rows: [
            ['Fireball', 'Gathers fire aether, hurls at enemy. Up to five in quick succession.'],
            ['Flame Torrent', 'Stomps foot; torrent of fire surrounds briefly.'],
            ['Lightning Rod (Snap Cast)', 'Stores a charge, deploys on finger snap. Instant bolt to target.'],
            ['Lightning Rod (Full Cast)', 'Massive levin release. Cannot move while channeling.'],
            ['Ice Dagger / Shards', 'Throws an ice dagger; variant explodes into shrapnel.'],
            ['Ice Wall / Spikes', 'Wall for cover, or ice spikes from the ground.'],
            ['Wind Blast', 'Deflects projectiles and people.'],
            ["Wind\'s Razor", 'Vibrating wind strip around hands — chainsaw-like.'],
            ["Titan\'s Fists", 'Rock-hard gauntlets increase punching power.'],
            ['Barrier', 'Flat aetherial barriers. Usable as platforms. Up to 5 at once.'],
            ['Mana Ward / Shield', 'Ward: redirects impact to ground. Shield: sustained absorption.'],
            ['Tri-Bind', 'Aetherial chains from ground or self to bind enemies.'],
            ['Sense Dulling / Heightening', 'Via direct contact: suppresses or amplifies target\'s senses.'],
            ['Clach (Rock Armor)', 'Rips rock shards from ground, fashions into armor.'],
            ['Voice Throw / Change', 'Projects voice elsewhere, or modulates it to impersonate.'],
            ['Sidhe / Fairy Dash', 'Near-teleportation speed via wind blasts. Max two consecutive uses. [Wind Attunement]'],
            ["Void\'s Hunger", 'Absorbs aether from any touched object or creature. Fuels spells, heals. Fomorian nature refined — not a learned technique.'],
            ['Thunder Serpent', 'Temporarily converts body into pure lightning. Instant only.'],
            ['Xceed (LB2)', '11 seconds of supersonic speed and destructive force. Body collapses when it ends.'],
            ['Meteor (LB3)', 'Third Limit Break. Invented by [[Merlin]]. Most destructive spell in his arsenal. [Full mechanics TBD]'],
          ]
        },
        { type: 'subsection', text: 'Aetherial Alignment' },
        { type: 'table', headers: ['Element', 'Affinity', 'Notes'],
          rows: [
            ['Levin', '26%', 'Dominant — natural attunement. Lightning resistance.'],
            ['Fire / Earth / Ice / Wind', '16% each', ''],
            ['Water', '10%', 'Weakest — Lightning boils Water (diametric opposition).'],
          ]
        },
      ]},
      { id: 'relationships', heading: 'Relationships', content: [
        { type: 'p', text: '**[[Nimvaei / Liraz Laskaris|Nimvaei / Liraz]]:** Partner, best friend, eventual wife. Teacher/student energy that does not feel unequal. Humor flows both ways. He has been secretly training her to kill him if he loses control — and told her so at the start of the Umbra arc, after teaching her Smash.' },
        { type: 'p', text: '**[[Mewecho]]:** Twin sister. They found each other without knowing it across a guild conflict. Once they know, they become inseparable. Her bracelet and his are attuned; he can always find her. His family is back in Erinn — or at least he hopes so.' },
        { type: 'p', text: '**[[Merlin]]:** Mentor. Four years of genuine teaching. Gifted him the knuckles and the techniques that made him uniquely capable in Eorzea. The nature of what Merlin actually is remains open.' },
        { type: 'p', text: '**[[Auria Van Varus]]:** Antagonist. Hates him ideologically — he is freedom where she is control. She views him as the one who stole Liraz from her.' },
      ]},
    ],
  },

  'nimvaei-liraz': {

    stub: false,

    infobox: {

      ],
      groups: [
        { heading: null, fields: [
          ['Full Name', 'Liraz Laskaris (formerly Nimvaei Tumet)'],
          ['Race', "Au Ra (Xaela) — Tumet Clan, Azim Steppe"],
          ['Age', '26'],
          ['Height', '174 cm (taller than typical Au Ra — experimentation)'],

          ['Scales', 'Black'],
          ['Eyes', 'Golden'],
          ['Job', 'Dark Knight → Runic Dark Knight (endpoint)'],

        ]},
        { heading: 'Personal Status', fields: [
          ['Status', 'Alive'],

        ]},
        { heading: 'Affiliation', fields: [
          ['Current', '[TODO]'],
          ['Previous', "[[Fury's Gaze]] (Auria's subject)"],
        ]},
        { heading: 'Occupation', fields: [
          ['Current', 'Adventurer / Dark Knight'],
          ['Previous', "Auria Van Varus's operative (groomed)"],
        ]},
        { heading: 'Base of Operations', fields: [
          ['Current', '[TODO]'],
        ]},
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Nimvaei** and **Liraz** are not two separate people. They are two halves of one — split by trauma. **Liraz Laskaris** is the original self, a child of the Tumet Clan on [[Hydaelyn]]\'s Azim Steppe. **Nimvaei** is what Liraz became after years under [[Auria Van Varus]] broke her apart — the innocence that survived, filtered through a dissociative break, carrying partial amnesia of her past as Liraz.' },
        { type: 'p', text: 'Their full arc is reintegration. Nimvaei willingly sacrifices herself — not dying, but merging back into Liraz, becoming her living shadow. She becomes the part of Liraz that can still believe in people. Liraz can summon her shadow form.' },
      ]},
      { id: 'appearance', heading: 'Appearance', content: [
        { type: 'p', text: 'An Au Ra Xaela woman, slender but strong, with black scales, golden eyes, pale white skin, and dark hair worn long and loose. At 174 cm she is noticeably taller than typical Au Ra — a consequence of [[Auria Van Varus|Auria\'s]] experimentation. Xaela tribal markings run down the side of her face. Her look shifts dramatically by context: as Nimvaei in combat she wears full heavy black Dark Knight plate with silver engravings and fur-trimmed shoulders — deeply gothic and imposing. Off-duty she wears warmer, layered clothing, patterned scarves, embroidered jackets in earthy tones. As Liraz operating under Auria, she wore a dark military long coat with a face covering and red sash — everything concealed, assassin aesthetic. The contrast with [[Zekito Silverblood|Zekito]] is not colour (both wear dark) but register: she looks built for something. He looks like someone who enjoys the fight.' },
        { type: 'p', text: '**Trance Form:** Draconic transformation — partial conversion to [[Woeborn|Nidhogg-like]] scales, fire aether going primal, demonic horns, raw energy. See [[The Trance]].' },
      ]},
      { id: 'personality', heading: 'Personality', content: [
        { type: 'p', text: 'Curious and engaged, not passive — she synthesizes and reflects back rather than just absorbing. Analytical by instinct. Warm and affectionate without being saccharine; her comfort with [[Zekito Silverblood|Zekito]] is shown through easy banter, not declarations. More formally spoken than him, but not stiff.' },
        { type: 'p', text: 'Her natural aetherial alignment is Fire — mirrors her Dark Knight soul; both are about controlled destruction. Fire comes naturally but is dangerous without discipline.' },
        { type: 'table', headers: ['Detail', 'Notes'],
          rows: [
            ['Food', 'Eats out of necessity, not enjoyment — whatever is available, simple, sufficient. In quieter moments she might put care into it.'],
            ['Faith', 'None. Does not believe in gods.'],
            ['Always Carries', 'A weapon. Her soul crystal. A bracelet given to her by [[Zekito Silverblood|Zekito]].'],
            ['Gear', 'Maintains her own weapons and equipment — not expertly, but good enough.'],
          ]
        },
        { type: 'quote', text: '"If her fifteen-year-old self were told about the present Nimvaei — the freedom, the strength, the fact that someone would choose her without trying to own or hurt her — she wouldn\'t believe it. Not one word of it."' },
      ]},
      { id: 'liraz-self', heading: 'Liraz — The Hidden Self', content: [
        { type: 'p', text: 'Cold, jagged, capable. A trained assassin and Dark Knight, groomed from childhood by [[Auria Van Varus]]. She hides inside Nimvaei\'s mind for most of the story, surfacing in moments of crisis. She is afraid of her own Dark Knight abilities — not that they would consume her, but that she might actually want them to.' },
        { type: 'p', text: 'She did not choose the Dark Knight path. She picked up [[Luvsan]]\'s soul crystal from his body. What she did not know until the [[Woeborn]] fight: she had killed the man it belonged to. He had been there trying to free her. She put a knife in his neck because everything in her said threat. She didn\'t know. She didn\'t care. She was safe. That was enough, back then.' },
        { type: 'p', text: 'Liraz\'s breakthrough is mechanical as well as narrative: she can only defeat the shade of [[Luvsan]] inside [[Woeborn]] by letting it stab her — by stopping running from what she is. When she does, the shadow becomes her blade.' },
      ]},
      { id: 'history', heading: 'History', content: [
        { type: 'subsection', text: 'Before Auria' },
        { type: 'p', text: 'Before everything, she was quiet, determined, and attentive — a Tumet child who wanted to prove herself to her tribe and earn the honour of a name. At age ten she failed her trial. That failure fractured her certainty. She stopped feeling driven. When hope dwindled, survival took its place.' },
        { type: 'p', text: 'It was out of that fractured survival state that [[Auria Van Varus]] found her. Subject 142Ω. Ten doses of Compound Omega. Age twelve.' },
        { type: 'subsection', text: 'Under Auria' },
        { type: 'p', text: 'Dragon blood experimentation. Training that was also systematic psychological dismantlement. Liraz was intended to be [[Auria Van Varus|Auria\'s]] prized creation and eventual successor. At some point she was in a group being transported to a brothel Auria owned when [[Luvsan]] attacked Auria\'s men trying to free them. She killed him, not knowing who he was. She picked up his crystal years later, not knowing she had killed the man it belonged to.' },
        { type: 'p', text: 'The hardest decision she ever made was choosing to break free from her chains — to stop enduring and start choosing. To pursue what she actually wanted, for the first time, on her own terms.' },
      ]},
      { id: 'trance', heading: 'The Trance', content: [
        { type: 'p', text: 'Nimvaei\'s most dangerous state. A fusion with [[Woeborn]] that partially transforms her body and overrides her aether with Nidhogg\'s draconic power. It is not a technique. It is a curse she has to win against every time she uses it.' },
        { type: 'subsection', text: 'Activation' },
        { type: 'p', text: 'The first activation was not her choice — someone stabbed her with [[Woeborn]], forcing the fusion involuntarily. Every subsequent use requires her to stab herself with Woeborn and win a battle of wills against Nidhogg\'s rage. If she wins, she controls the Trance. If she loses, her mind is trapped and Nidhogg\'s will takes over completely — making her an unstoppable force of destruction.' },
        { type: 'subsection', text: 'Effects' },
        { type: 'ul', items: [
          'Draconic transformation: skin partially converts to Nidhogg-like scales; near-indestructibility. Fire aether becomes unstable — no longer controlled destruction, but primal.',
          'Anti-aether nullification: all aetherial enhancements, spells, and defenses are cancelled on contact. Mages are effectively helpless against her in this state.',
          'Extreme physical boost: strength and endurance push far beyond normal limits — she must be careful not to overexert and break her own body.',
        ]},
        { type: 'subsection', text: 'Cost' },
        { type: 'ul', items: [
          'Every activation is a risk — losing the internal fight against Nidhogg means she is gone.',
          'Significant physical toll on recovery.',
          'Single use per engagement — like [[Zekito Silverblood|Zekito\'s]] Xceed, all-or-nothing.',
        ]},
      ]},
      { id: 'plots', heading: 'Plots', subsections: ['Lunar Rose Arc', "Fury\'s Gaze Arc", 'Runes of Chimera', 'Umbra Arc'], content: [
        { type: 'subsection', text: 'Lunar Rose Arc' },
        { type: 'p', text: 'Nimvaei enrolled at [[Lunar Rose Academy]] alongside [[Zekito Silverblood|Zekito]]. Their relationship begins here — teacher/student energy that does not feel unequal. During this arc Zekito revealed he is not from [[Hydaelyn]] and is a half-Fomor. She was present during the Blackguard ambush and killed it — retaining no memory of the fight.' },
        { type: 'subsection', text: "Fury\'s Gaze Arc" },
        { type: 'p', text: 'She is the reason [[Zekito Silverblood|Zekito]] escaped [[Fury\'s Gaze]] with his life — details pending. [[Auria Van Varus|Auria]] views Liraz as her stolen creation. [[Lorelai Lesrekta]]\'s vendetta begins with what Liraz did to her before the arc.' },
        { type: 'subsection', text: 'Runes of Chimera' },
        { type: 'p', text: 'The player character in [[Runes of Chimera]]. She acquires six elemental runes across the quest — Ice, Water, Earth, Levin, Fire, Wind — each tied to a location. The Woeborn fight at Red Rim forces her to relive the memory of killing [[Luvsan]] and finally understand what she had been seeing. She defeats the shade by letting it stab her. The shadow becomes her blade.' },
        { type: 'subsection', text: 'Umbra Arc' },
        { type: 'p', text: 'She cut and dyed [[Zekito Silverblood|Zekito\'s]] hair black at the start of this arc to disguise him — silver-white stood out too much. At the same time, he told her for the first time that he has been secretly training her to kill him if he loses control. Full arc details pending.' },
      ]},
      { id: 'relationships', heading: 'Relationships', content: [
        { type: 'p', text: '**[[Zekito Silverblood|Zekito]]:** Partner, best friend, eventual husband. Comfort with him is shown through easy banter, not declarations. She is the only person he has told about the kill-switch training. She is also the person who dyed his hair and made sure he did not get caught.' },
        { type: 'p', text: '**[[Auria Van Varus|Auria]]:** Her abuser, her maker, the person whose voice still lives in the architecture of her fear responses. Auria views her as a stolen possession.' },
        { type: 'p', text: '**[[Luvsan]]:** The man she killed without knowing who he was. Whose crystal she carried for years without knowing she had killed him. Whose rage became her courage. He passed the torch. She carries it.' },
        { type: 'p', text: '**[[Woeborn]]:** Half of her soul is the sword. All inhabitants can reach her. Nimvaei — her living shadow — is inside it.' },
      ]},
    ],
  },

  'auria-van-varus': {
    id: 'auria-van-varus',
    title: 'Auria Van Varus',
    subtitle: 'General. Scientist. The architect of suffering.',
    category: 'character',
    tags: ['character', 'hydaelyn', 'antagonist', 'garlean'],
    stub: false,
    todos: [],
    infobox: {
      title: 'Auria Van Varus',
      imageTabs: [
        { label: 'Current', src: null, caption: 'White military uniform' },
        { label: 'Field', src: null, caption: 'Operational attire' },
      ],
      groups: [
        { heading: null, fields: [
          ['Titles', 'General of the Garlean Empire'],
          ['Race', 'Hyur (Midlander)'],
          ['Height', '168 cm'],
          ['Eyes', 'Brown — sharp, calculating'],

          ['Weapon', 'Gunblade'],
        ]},
        { heading: 'Personal Status', fields: [
          ['Status', 'Deceased — killed 1582'],

        ]},
        { heading: 'Affiliation', fields: [
          ['Current', 'N/A (deceased)'],
          ['Previous', "[[Fury's Gaze]] (founder/leader), [[Umbra]] (funded), Garlean Empire (former)"],
        ]},
        { heading: 'Occupation', fields: [
          ['Previous', "General (Garlean Empire), Research Director (Fury's Gaze)"],

        { heading: 'Base of Operations', fields: [

        ]},
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Auria Van Varus** is the former General of the Garlean Empire and the founder/leader of [[Fury\'s Gaze]]. She retreated to the Western Coerthas Highlands after Garlemald\'s collapse and built a private research facility, pursuing her vision of creating "Neo-Garleans" — a race bioengineered for superiority. She is the origin of all of [[Nimvaei / Liraz Laskaris|Liraz\'s]] trauma.' },
        { type: 'p', text: 'She was killed in 1582, during the events of the [[Final Days]].' },
      ]},
      { id: 'personality', heading: 'Personality', content: [
        { type: 'p', text: 'Ruthless, ambitious, and cold. She moves with the composure of someone who has already calculated three steps ahead, and the cruelty of someone who finds the calculation enjoyable. Her scientific approach is dispassionate — she observes test subjects the way a researcher watches reactions in a dish. Beneath that detachment, she takes personal pleasure in suffering, particularly in women, because it confirms her power.' },
        { type: 'p', text: 'She values efficiency and precision above all. Every relationship is transactional. Every ally is someone to be used and discarded when necessary. She views compassion as a weapon to exploit, not an experience to have.' },
      ]},
      { id: 'history', heading: 'History', content: [
        { type: 'p', text: 'Shaped by years of abuse under a sadistic captain who molded her into a ruthless soldier. In the end, she murdered him and took his place — her first significant act of domination, and the template for everything that followed. During Garlemald\'s collapse she retreated to Coerthas and began building [[Fury\'s Gaze]].' },
      ]},
      { id: 'operations', heading: 'Operations', content: [
        { type: 'p', text: 'Beyond the [[Compound Research|compound programs]], Auria ran parallel operations serving as income streams and subject supply chains. She owned at least one brothel used to traffic women — primarily young women of the same demographic targeted by the [[Lambs of Dalamud]]. This is how [[Nimvaei / Liraz Laskaris|Liraz]] encountered [[Luvsan]]: she was being transported to that brothel when Luvsan attacked Auria\'s men to free the captives. Auria had wanted Luvsan dead for years due to the disruption he caused.' },
      ]},
      { id: 'plots', heading: 'Plots', subsections: ["Fury\'s Gaze Arc"], content: [
        { type: 'subsection', text: "Fury\'s Gaze Arc" },
        { type: 'p', text: 'Auria runs [[Fury\'s Gaze]] as both a research facility and a criminal operation, funded by [[Umbra]]. She captures [[Zekito Silverblood|Zekito]] (Subject 241Ψ) and administers Compound Psi on her orders. She is killed in 1582 during the events of the Final Days. Her death leaves [[Amelia Graves]] unmoored, [[Cailean Arda]] reporting directly to [[Umbra]], and [[Lorelai Lesrekta]] still hunting [[Nimvaei / Liraz Laskaris|Liraz]] on her own terms.' },
      ]},
      { id: 'relationships', heading: 'Key Relationships', content: [
        { type: 'p', text: '**[[Nimvaei / Liraz Laskaris|Liraz]]:** Auria took Liraz as a child, subjected her to Compound Omega experimentation at age 12, and spent years dismantling and rebuilding her as a prized creation and intended successor. What Auria did not account for: the person she was breaking had a self that refused to fully disappear. Nimvaei is what survived.' },
        { type: 'p', text: '**[[Zekito Silverblood|Zekito]]:** Auria hates him with thoroughness that is almost ideological. He is the antithesis of everything she values — freedom where she is control, compassion where she is cruelty, loyalty freely given where she demands obedience through fear. More specifically: he is the one who took Liraz from her. She experiences that not as love but as theft.' },
        { type: 'p', text: '**[[Cailean Arda]]:** Her apparent second-in-command during her tenure — but actually [[Umbra]]\'s embedded observer inside [[Fury\'s Gaze]], placed there to monitor her progress and protect their investment. She never knew he was always watching.' },
        { type: 'p', text: '**[[Amelia Graves]]:** Amelia loves Auria — genuinely. Whether this is the product of years of psychological conditioning or something that survived it is an open question. With Auria gone, that love is unmoored with nowhere to go. [[Umbra]] considers it a serious volatility risk.' },
      ]},
    ],
  },

    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Mores Gwydion** is the hidden villain of [[Runes of Chimera]]. A mage from Werlyt who has body-hopped through history for over a century using a forbidden technique called [[Oversoul]], keeping himself alive long enough to resurrect his daughter [[Mari]]. He is not truly evil — he is a devastated father who refused to accept his daughter\'s death and let that refusal consume a century. His love without limits became something that hurt everyone it touched.' },
        { type: 'p', text: 'He presents himself to [[Zekito Silverblood|Zekito]] and [[Nimvaei / Liraz Laskaris|Nimvaei]] as **Orraux Clauvier**, an arcanist-medic at Camp Dragonhead. Orraux\'s body is merely his current vessel.' },
      ]},
      { id: 'history', heading: 'History', content: [
        { type: 'table', headers: ['Year', 'Event'],
          rows: [
            ['1520', 'Gravely wounded fighting Nidhogg\'s advance. Enters stasis for two years. Presumed dead — [[Woeborn]] is forged from a Nidhogg scale in his honour. He did not forge it himself.'],
            ['1521', 'His family is slaughtered by Garleans. His daughter [[Mari]] (age 19) is captured and used in early Oversoul experiments. He recovers from stasis to find everything gone.'],
            ['1528', 'Begins studying Oversoul — the forbidden technique of soul transference.'],
            ['1537', 'Age 75. Performs his first Oversoul transfer to avoid dying before his goal is achieved.'],
            ['1558', 'Encounters Geciro Teciro (Lociro\'s brother) in a new host body.'],
            ['1559', 'Meets Nunuwa Nuwa — Geciro\'s wife. Tells her the truth. She becomes an ally.'],
            ['1561', 'Creates the Mari mammet using her soul imprint. Calls it a success. It is not a true resurrection.'],
            ['1563', 'Chimera experiments to develop a soul-harmonizing core — early attempts crack and break.'],
            ['1576', 'Takes Galene Didanc\'s mother as next host body.'],
            ['1582', 'Oversouls into Orraux Clauvier — his body at the start of [[Runes of Chimera]].'],
          ]
        },
      ]},
      { id: 'plots', heading: 'Plots', content: [
        { type: 'p', text: 'As Orraux, he sends [[Zekito Silverblood|Zekito]] and [[Nimvaei / Liraz Laskaris|Nimvaei]] to collect six specific ingredients across Eorzea, claiming they are for a cure to Blackram disease afflicting his daughter Edrette. In truth, he wrote the book on the ruins himself, engineered the entire quest to harvest the materials he needed, and used Nim and Zek as unwitting lab assistants. [[Zekito Silverblood|Zekito]] caught the scent of his intent early and was immobilised to prevent interference.' },
        { type: 'p', text: 'His goal: a true full resurrection of [[Mari]], not merely the mammet approximation. The six ingredients map to the components of a soul harmonization process — with [[Woeborn]] (containing [[Mari]]\'s soul) as the final vessel.' },
        { type: 'p', text: '**Ending:** [[Nimvaei / Liraz Laskaris|Nimvaei]], with help from [[Luvsan]] (dormant in Woeborn) and the mammet [[Mari]], pulls Mores\' soul into [[Woeborn]], where Nidhogg\'s hunger confines him. Orraux is left comatose. Mores, dormant in the blade, eventually comes to a kind of peace — he is with [[Mari]] again, in a sense.' },
      ]},
    ],
  },

  'luvsan': {
    id: 'luvsan',
    title: 'Luvsan',
    subtitle: 'A guardian she never knew she had.',
    category: 'character',
    tags: ['character', 'hydaelyn', 'dark knight', 'coerthas'],
    stub: false,
    todos: [],
    infobox: {
      title: 'Luvsan',
      imageTabs: [
        { label: 'Current', src: null, caption: 'Western Coerthas mercenary' },
      ],
      groups: [
        { heading: null, fields: [
          ['Race', '[TODO]'],
          ['Job', 'Dark Knight'],
          ['Region', 'Western Coerthas Highlands'],
          ['Sister', "Taken by [[Auria Van Varus|Auria]]'s men"],
        ]},
        { heading: 'Personal Status', fields: [
          ['Status', 'Shade — dormant within [[Woeborn]] after passing the torch to Liraz'],
          ['Soul Crystal', 'Passed to [[Nimvaei / Liraz Laskaris|Liraz]] in 1578'],
        ]},
        { heading: 'Affiliation', fields: [
          ['Current', 'None (dormant)'],
          ['Previous', 'Independent mercenary'],
        ]},
        { heading: 'Occupation', fields: [
          ['Previous', "Mercenary / Dark Knight — protector of a Coerthas settlement"],
        ]},
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Luvsan** was a mercenary and Dark Knight operating in Western [[Coerthas]]. He dedicated his life to protecting a small frozen settlement at the edge of the wastes — providing food, gil, and safety to the people who lived there. He had a sister.' },
        { type: 'p', text: 'He was eventually killed by [[Nimvaei / Liraz Laskaris|Liraz]], who had no idea who he was. He had been trying to free her. His soul crystal, recovered years later without that knowledge, became the connection through which his rage at what [[Auria Van Varus|Auria]] had done to her became her courage — the thing that gave her the strength to finally run.' },
      ]},
      { id: 'history', heading: 'History', content: [
        { type: 'p', text: '[[Auria Van Varus]] raided his settlement in one of her operations to collect trafficking victims. His sister was taken. Luvsan spent years hunting Auria\'s operations in retaliation — slaughtering her men, ruining her income, causing major losses. He was a thorn in her side for a long time.' },
        { type: 'p', text: 'At some point, [[Mores Gwydion]] — inhabiting a host body — lured him to [[Ishgard]] with a promise of information. The meeting was a trap: Mores attempted to [[Oversoul]] into him. Luvsan\'s instinct to love and protect was greater than Mores\' will. His soul rejected the takeover — but the cost was severe. He became a rage-filled shade, sustained by a single drive: justice.' },
        { type: 'p', text: 'Two villains destroyed him independently and without ever knowing the other was involved: [[Auria Van Varus|Auria]] took everyone he loved; [[Mores Gwydion|Mores]] tried to take his body.' },
        { type: 'p', text: 'He was killed during one of Auria\'s trafficking operations — [[Nimvaei / Liraz Laskaris|Liraz]] was one of the women in the cart being transported to a brothel Auria owned. He was there attacking Auria\'s men, doing what he always did. From her perspective: a fearsome Dark Knight in the middle of a slaughter. [[Auria Van Varus|Auria\'s]] look still fresh in her memory, everything in her screaming to run. She had a job to finish first. She put a knife in his exposed neck, pulled it out, and watched him collapse. She didn\'t know who he was. She didn\'t care. She was safe. Finally.' },
        { type: 'p', text: 'In 1578, [[Nimvaei / Liraz Laskaris|Liraz]] picked up his soul crystal — not knowing she had killed the man it belonged to. Through the crystal, he witnessed what [[Auria Van Varus|Auria]] had been doing to her. His rage at that injustice became her courage. He stirred her soul and gave her the strength to run.' },
      ]},
      { id: 'plots', heading: 'Plots', content: [
        { type: 'subsection', text: 'Runes of Chimera — The Woeborn Fight' },
        { type: 'p', text: 'Inside [[Woeborn]], Luvsan\'s shade manifests as [[Nimvaei / Liraz Laskaris|Liraz\'s]] fear of her own Dark Knight abilities. The [[Woeborn]] fight forces her to relive the full memory — the cart, the other women, him attacking Auria\'s men, the knife, his collapse — and understand, for the first time, what she had actually been seeing.' },
        { type: 'p', text: 'She can only defeat the shade by **letting it stab her** — by stopping running from what she is. When she does, the shadow becomes her blade. Luvsan goes dormant. He passed the torch. He was never an antagonist. He was the person who died trying to free her, whose death she caused without knowing it, whose anger at that injustice became the thing that saved her.' },
      ]},
    ],
  },

  'merlin': {

    title: 'Merlin',
    subtitle: '"They say a true genius is born only once in a hundred years."',
    category: 'character',
    tags: ['character', 'erinn', 'the aces', 'druid'],
    stub: false,
    todos: [
      'What is Merlin exactly — has he genuinely not aged, or is he something else?',
      'Full details of what he did during his century of disappearance',
    ],
    infobox: {
      title: 'Merlin',
      imageTabs: [

      ],
      groups: [

          ['Student', '[[Zekito Silverblood]]'],

        { heading: 'Personal Status', fields: [
          ['Status', 'Active — unaged; sightings across Erinn persist'],
          ['True Nature', '[TODO — what is Merlin exactly?]'],
        ]},
        { heading: 'Affiliation', fields: [
          ['Current', '[[The Aces]] (presumed)'],
          ['Previous', 'Royal Castle Druid'],
        ]},
        { heading: 'Occupation', fields: [
          ['Current', 'Wandering adventurer'],
          ['Previous', 'Royal Castle Druid'],
        ]},
        { heading: 'Base of Operations', fields: [
          ['Current', 'Unknown — travels [[Erinn]]'],
        ]},
      ]
    },
    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Merlin** is one of the most powerful mages in [[Erinn]] — and one of the most mysterious. He cast his first Lightning Bolt at age three. Invented his first new spell at eleven. Mastered every known form of magic by twenty-three. The magic community expected much from him; he was made Royal Castle Druid and put to work on research and kingdom defence. The work lacked the challenge to hold his interest. He vanished in search of adventure. That was over a hundred years ago.' },
        { type: 'p', text: 'He hasn\'t aged a day. Reports persist: if you are ever in genuine need, a Druid fitting his description will appear. Ever the playful prankster.' },
      ]},
      { id: 'inventions', heading: 'Inventions', content: [
        { type: 'p', text: 'Merlin didn\'t just master magic — he expanded what magic could do. His contributions are foundational:' },
        { type: 'ul', items: [
          '**Snap Cast:** Chargeable magic skills fire instantly — no casting time, no charge-up. Activates once per skill duration. The mechanic behind [[Zekito Silverblood|Zekito\'s]] instant Lightning Rod; the finger snap is the trigger. Considered impossible by Eorzean standards.',
          '**Spellwalk:** Allows spells to be cast while moving. Eorzean mages must be stationary to cast. [[Zekito Silverblood|Zekito]] arrived in Eorzea treating both as completely ordinary — he didn\'t realize they were unusual until people started staring.',
          '**Meteor Strike:** [[Zekito Silverblood|Zekito\'s]] LB3. His most destructive invention.',
          '**The Aces\' Weapons:** Merlin crafted the tools used by [[The Aces]], including [[Zekito Silverblood|Zekito\'s]] custom knuckles — identical in shape to the ones he\'d carried since age eleven, but built to channel high magic without a focus.',
        ]},
      ]},
      { id: 'zekito', heading: 'Mentorship of Zekito', content: [
        { type: 'p', text: 'Merlin tested both [[Zekito Silverblood|Zekito]] and [[Mewecho]] before agreeing to enhance their bracelets. [[Mewecho]] returned to [[Audacia]]; [[Zekito Silverblood|Zekito]] spent four years travelling with [[The Aces]] under Merlin\'s mentorship. The training was rigorous and genuine — when Zekito left, Merlin gave him the custom knuckles as a farewell gift, without ceremony. The playful exterior and the real investment in other people\'s growth are both true.' },
      ]},
      { id: 'history', heading: 'History', content: [
        { type: 'p', text: 'Cast his first Lightning Bolt at age three. Invented his first spell at eleven. Mastered every known form of magic by twenty-three. Was made Royal Castle Druid. The work lacked challenge. He vanished in search of adventure over a century ago and has not aged a day since. [TODO: What Merlin actually is remains an open question — even he is not forthcoming about it.]' },
      ]},
      { id: 'plots', heading: 'Plots', content: [
        { type: 'p', text: 'Merlin appears at key moments across [[Erinn]] — testing [[Zekito Silverblood|Zekito]] and [[Mewecho]], enhancing their bracelets, spending four years mentoring Zekito, giving him the custom knuckles on departure. His appearances follow a consistent pattern: he arrives when someone genuinely needs him, leaves without ceremony, and does not explain himself. What he does between appearances is not documented.' },
      ]},
    ],
  },

  'mewecho': {

    infobox: {

      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Mewecho Silverblood** is [[Zekito Silverblood|Zekito\'s]] twin sister and the other surviving child of [[Isanshiro]] and their Fomorian mother. Where Zekito was sent to [[Tir Chonaill]] as a farm boy, she was sent alone to the cold northern [[Vales]] — a far harsher fate. She carries the same [[Fomorian Blood|Fomorian blood]] as her brother. Her bracelet is the twin of his, the two attuned to each other so they can never truly lose one another.' },
        { type: 'p', text: 'The twins met entirely by chance in [[Erinn]] — she was serving as an officer of [[Nixia]] when [[Zekito Silverblood|Zekito]] arrived to negotiate on [[Audacia]]\'s behalf. They interacted through the full guild conflict without knowing they were siblings. The truth came during a joint mission through [[Iria]]: a dragon descended, [[Mewecho]] lost control of her Fomorian blood in a berserk rage and felled the beast — and [[Zekito Silverblood|Zekito]] recognized her bracelet.' },

      { id: 'history', heading: 'History', content: [
        { type: 'subsection', text: 'The Vales' },
        { type: 'p', text: 'While [[Zekito Silverblood|Zekito]] was sent to [[Tir Chonaill]] as a farm boy, Mewecho was sent alone to the cold northern [[Vales]] — a harsher fate for a child. She carried the same Fomorian blood with no one to guide her through it.' },
        { type: 'subsection', text: 'Nixia' },
        { type: 'p', text: 'Mewecho rose to become an officer of [[Nixia]] — the splinter guild that broke off from [[Audacia]]. When [[Zekito Silverblood|Zekito]] arrived at Nixia to negotiate on Audacia\'s behalf, they interacted through the full guild conflict without either knowing the other was their sibling. The truth came during a joint mission through Iria: a dragon, her berserk rage felling the beast, and Zekito recognizing her bracelet.' },

      { id: 'plots', heading: 'Plots', content: [

    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Isanshiro Silverblood**, known as the Silver King, is a Milletian — a being from another world — who traveled [[Erinn]], amassed a fortune, and used it to build [[The Silver Kingdom]] for the destitute. His relationship with a Fomorian woman was the forbidden union that caused the [[Knights of Light]] to destroy everything he built. To protect his twin children, he placed memory seals on them and had them escorted to different parts of Erinn before the castle fell.' },
        { type: 'p', text: 'He placed memory seals on the twins to protect them, then disappeared. He later resurfaced in contact with [[Mewecho]], who kept this secret from [[Zekito Silverblood|Zekito]] out of fear of his reaction. He is deeply guarded about what happened to the twins\' mother — the one subject he will not discuss.' },
        { type: 'p', text: '**The Silverblood name** did not come from Isanshiro — his true name before he became the Silver King is unknown. The name grew from outside: references to \'the silver-haired bloodline\' shortened over time to \'the Silverbloods\', and eventually became the family name that Zekito and Mewecho carry. A name earned from history rather than given at birth.' },
      ]},
      { id: 'history', heading: 'History', content: [
        { type: 'p', text: 'A Milletian from another world, Isanshiro traveled Erinn for years before amassing his fortune and building [[The Silver Kingdom]] for the destitute. At some point he entered into a relationship with a Fomorian woman — a forbidden union that brought the [[Knights of Light]] down upon his kingdom. He placed memory seals on the twins and had them escorted to safety before the siege destroyed everything he had built.' },
        { type: 'p', text: 'The name Isanshiro Silverblood is not his original name. His true name before he became the Silver King is unknown. The surname grew from outside: references to the silver-haired bloodline became the Silverbloods collectively, eventually hardening into a family name. He did not choose it. History chose it for him.' },
        { type: 'subsection', text: 'Chapter L̵̾̔õ̵̾s̷̟̓t̶̓̓: A Bard\'s Tale of Forgotten Times' },
        { type: 'p', text: 'A bardic verse circulating in Eorzea. [[Zekito Silverblood|Zekito]] has encountered it and does not know it is about him. He reads it as an interesting historical piece about someone else\'s tragedy.' },
        { type: 'rp', lines: [
          { speaker: '', text: 'Long ago, in a forgotten history, lived a simple merchant.' },
          { speaker: '', text: 'A drifter of the world, for he had no name nor home.' },
          { speaker: '', text: 'A drifter to be known, for his heart of gold.' },
          { empty: true },
          { speaker: '', text: 'With silver hair, and silver coin, would his word carry forth.' },
          { speaker: '', text: 'To live and give, to make believe, oh the poor-gotten sod.' },
          { empty: true },
          { speaker: '', text: 'In times of strife, his name be called, oh kind Merchant of Silver.' },
          { speaker: '', text: 'In time of need, to raise and give, the drifter would come hither.' },
          { empty: true },
          { speaker: '', text: 'And thus, the lone would gain its flock, a castle to be raised.' },
          { speaker: '', text: 'The drifter crowned as Silver King, a feast is to be held.' },
          { empty: true },
          { speaker: '', text: 'Forbidden love with poisoned kisses, the twin fruits of our passion.' },
          { speaker: '', text: 'The gentle flower and eager watcher, celebrated for occasion.' },
          { empty: true },
          { speaker: '', text: 'Yet faith is steep and demons weep, a dark cloud on horizon.' },
          { speaker: '', text: 'When men of cloth are moving forth, to get rid of the frighten.' },
          { empty: true },
          { speaker: '', text: 'And thus, was history lost to ruin.' },
          { speaker: '', text: 'The glint of silver, painted red.' },
          { speaker: '', text: 'The twin breaths drifting in the wind.' },
          { speaker: '', text: "There\'s rumors they have fled." },
        ]},
        { type: 'p', text: 'The drifter is Isanshiro. The twin fruits — the gentle flower and eager watcher — are [[Mewecho Silverblood|Mewecho]] and [[Zekito Silverblood|Zekito]]. The men of cloth are the Knights of Light. The frighten is Zekito\'s mother. The verse does not know what happened to the twins — only that they were not found.' },
      ]},
      { id: 'plots', heading: 'Plots', content: [
        { type: 'p', text: 'Isanshiro does not arrive in [[Hydaelyn]]. He resurfaced in [[Erinn]] in contact with [[Mewecho Silverblood|Mewecho]], who kept this secret from [[Zekito Silverblood|Zekito]] out of fear of his reaction. He is deeply guarded about what happened to the twins\' mother — the one subject he will not discuss. [TODO: Full backstory and role going forward.]' },
      ]},
    ],
  },

    sections: [
      { id: 'overview', heading: null, content: [
        { type: 'p', text: '**Erinn** is the source world of Fantasy Tales — where [[Zekito Silverblood]] was born and spent the majority of his early life. A world of magic, myth, and ancient power. Milletians — beings from other worlds — exist in Erinn as a known phenomenon, treated with curiosity and wariness.' },
      ]},
      { id: 'regions', heading: 'Regions & Key Locations', content: [
        { type: 'table', headers: ['Location', 'Description'],
          rows: [
            ['Uladh', 'The western region — more civilized. Contains Tir Chonaill, Dunbarton, and Tara.'],
            ['[[Tir Chonaill]]', "A small farming village in Uladh. Zekito's adoptive home and the place that banished him."],
            ['[[Dunbarton]]', "A larger town in Uladh. Zekito spent a year here as a street rat after banishment."],
            ['[[Dugald Forest]]', 'Forest connecting Tir Chonaill and Dunbarton. Site of the encounter with the adventurer who gave Zekito his first knuckles.'],
            ['Tara', 'Capital city of Uladh. Hub of commerce and politics.'],
            ['Belvast', 'The only major market island in Erinn. A melting pot of merchants, adventurers, and mercenaries.'],
            ['Iria', 'The eastern continent. Vast deserts, elven villages, homeland of various tribes. Site of the zealot hideout.'],
            ['Vales', 'Northern cold lands. Where [[Mewecho]] was forced to grow up alone.'],
            ['The Silver Kingdom', "Isanshiro's kingdom, built for the destitute. Destroyed by the Knights of Light."],
          ]
        },
      ]},
      { id: 'nature', heading: 'Nature of Erinn', content: [
        { type: 'p', text: 'Erinn accommodates both humans and [[Fomorian Blood|Fomorians]] — ancient, powerful beings of primal magic. Half-breeds (those born of both) are rare and carry immense power, but that power is volatile. [[Fomorian Blood|Fomorian blood]] expresses as berserk states where the host loses all control. Bracelets enchanted by powerful mages can suppress this, but the blood is never truly gone.' },
      ]},
      { id: 'magic', heading: 'Magic System', content: [
        { type: 'p', text: 'Magic in Erinn typically requires a **focus** — a staff or wand — to channel. Higher-level magic without a focus is considered extremely difficult and rare. [[Zekito Silverblood|Zekito]] is one of the very few who can do this, thanks to his custom knuckles crafted by [[Merlin]] and the techniques Merlin taught him (Snap Cast, Spellwalk).' },
      ]},
    ],
  },
